<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى الشامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        
        .prayer-header { background: #111; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 18px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.08); padding: 8px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }

        .controls-area { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); }
        .btn-gps { width: 100%; padding: 12px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        
        .switch-mode { display: flex; justify-content: center; padding: 10px; gap: 8px; }
        .toggle-btn { cursor: pointer; padding: 6px 12px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; }
        body.dark .toggle-btn { background: #444; color: #fff; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .month-label { font-weight: bold; color: var(--saudi-green); font-size: 16px; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px; }
        .day-name { text-align: center; font-size: 10px; color: #999; font-weight: bold; padding-bottom: 8px; }
        .day-cell { height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; position: relative; cursor: pointer; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        
        .event-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; margin-top: 3px; }
        .flag-icon { width: 12px; height: 8px; background: var(--saudi-green); border: 1px solid white; margin-top: 3px; }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <div id="countdown">باقي على <span id="next-p-name">الصلاة</span> <span id="timer">00:00:00</span></div>
        <div class="prayer-grid" id="pGrid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="f_time">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="d_time">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="a_time">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="m_time">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="i_time">--:--</span></div>
        </div>
    </div>

    <div class="controls-area">
        <button class="btn-gps" onclick="syncLocation()">📍 تحديث المواقيت حسب موقعك الحالي</button>
        <div id="location-label" style="font-size: 12px; text-align: center; color: var(--primary);">موقعك الحالي: مكة المكرمة</div>
    </div>

    <div class="switch-mode">
        <button class="toggle-btn" onclick="toggleCalendar()">التبديل للميلادي</button>
        <button class="toggle-btn" onclick="document.body.classList.toggle('dark')">🌗 الوضع الليلي</button>
    </div>

    <div class="header">
        <button class="toggle-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="toggle-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
</div>

<script>
    let viewDate = new Date(), isHijri = true;
    const events = { '9-23': 'flag', '2-22': 'flag', '10-1': 'dot', '12-10': 'dot' };

    function getHijriDate(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {day:'numeric', month:'numeric', year:'numeric'}).format(date);
    }

    async function syncLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const res = await fetch(`https://api.aladhan.com{p.coords.latitude}&longitude=${p.coords.longitude}&method=4`);
                const data = await res.json();
                updatePrayerUI(data.data.timings);
                document.getElementById('location-label').innerText = "تم التحديث بناءً على GPS";
            });
        }
    }

    function updatePrayerUI(t) {
        document.getElementById('f_time').innerText = t.Fajr;
        document.getElementById('d_time').innerText = t.Dhuhr;
        document.getElementById('a_time').innerText = t.Asr;
        document.getElementById('m_time').innerText = t.Maghrib;
        document.getElementById('i_time').innerText = t.Isha;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = ['ح', 'ن', 'ث', 'ر', 'خ', 'ج', 'س'].map(d => `<div class="day-name">${d}</div>`).join('');
        
        const monthInfo = isHijri ? getHijriDate(viewDate) : viewDate.toLocaleDateString('ar-SA');
        document.getElementById('monthDisplay').innerText = isHijri ? monthInfo.split(' ')[1] + ' ' + monthInfo.split(' ')[2] : viewDate.toLocaleString('ar-SA', {month:'long', year:'numeric'});

        // ملء الأيام (تبسيط للمثال)
        for (let i = 1; i <= 30; i++) {
            const isToday = i === new Date().getDate() && viewDate.getMonth() === new Date().getMonth();
            grid.innerHTML += `<div class="day-cell ${isToday ? 'today' : ''}">
                <span>${i}</span>
                ${events[`${viewDate.getMonth()+1}-${i}`] === 'flag' ? '<div class="flag-icon"></div>' : ''}
            </div>`;
        }
    }

    function toggleCalendar() { isHijri = !isHijri; renderCalendar(); }
    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }

    window.onload = () => {
        renderCalendar();
        // تحميل افتراضي لمكة
        fetch(`https://api.aladhan.com`)
            .then(r => r.json()).then(d => updatePrayerUI(d.data.timings));
    };
</script>
</body>
</html>
