<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى الرسمي</title>
    <style>
        :root { --saudi-green: #006C35; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; transition: 0.3s; margin: 0; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        .prayer-header { background: #111; color: #fff; padding: 20px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-size: 22px; display: block; font-family: monospace; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 8px 2px; border-radius: 6px; }
        .p-n { display: block; font-size: 11px; color: #bbb; }
        .p-t { display: block; font-size: 12px; font-weight: bold; color: var(--gold); }
        .info-area { padding: 20px; text-align: center; }
        .date-display { font-size: 18px; font-weight: bold; color: var(--saudi-green); margin-bottom: 10px; }
        body.dark .date-display { color: var(--gold); }
        .location-label { font-size: 13px; color: #888; margin-bottom: 15px; }
        .btn-gps { width: 90%; padding: 12px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <span id="next-prayer-name" style="font-size: 14px; color: #bbb;">جاري التحميل...</span>
        <span id="timer">00:00:00</span>
        <div class="prayer-grid" id="prayerGrid">
            <!-- ستظهر المواقيت هنا -->
        </div>
    </div>

    <div class="info-area">
        <div class="date-display" id="hijriDate">--/--/---- هـ</div>
        <div class="location-label" id="locationName">📍 مكة المكرمة</div>
        <button class="btn-gps" onclick="getLocation()">تحديث الموقع والمواقيت</button>
    </div>
</div>

<script>
    // 1. الحصول على تاريخ أم القرى بدقة
    function updateHijriDate() {
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', options).format(new Date());
        document.getElementById('hijriDate').innerText = hijri;
    }

    // 2. جلب مواقيت الصلاة (طريقة أم القرى رقم 4)
    async function getPrayerTimes(lat = 21.42, lon = 39.82) {
        try {
            const response = await fetch(`https://api.aladhan.com{Math.floor(Date.now()/1000)}?latitude=${lat}&longitude=${lon}&method=4`);
            const data = await response.json();
            const times = data.data.timings;
            
            const relevantTimes = {
                "الفجر": times.Fajr,
                "الظهر": times.Dhuhr,
                "العصر": times.Asr,
                "المغرب": times.Maghrib,
                "العشاء": times.Isha
            };

            displayPrayers(relevantTimes);
        } catch (error) {
            console.error("خطأ في جلب البيانات");
        }
    }

    function displayPrayers(times) {
        const grid = document.getElementById('prayerGrid');
        grid.innerHTML = Object.entries(times).map(([name, time]) => `
            <div class="prayer-item">
                <span class="p-n">${name}</span>
                <span class="p-t">${time}</span>
            </div>
        `).join('');
        document.getElementById('next-prayer-name').innerText = "مواقيت أم القرى الرسمية";
    }

    // 3. تحديد موقع المستخدم
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                getPrayerTimes(pos.coords.latitude, pos.coords.longitude);
                document.getElementById('locationName').innerText = "📍 حسب موقعك الحالي";
            }, () => getPrayerTimes()); // العودة لمكة في حال الرفض
        }
    }

    // التشغيل الأولي
    updateHijriDate();
    getPrayerTimes(); // مكة افتراضياً
</script>

</body>
</html>
