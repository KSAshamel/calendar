<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى</title>
    <style>
        :root { --saudi-green: #006C35; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        .prayer-header { background: #111; color: #fff; padding: 20px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 8px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 11px; color: #bbb; }
        .p-t { display: block; font-size: 12px; font-weight: bold; color: var(--gold); }
        .info-area { padding: 20px; text-align: center; }
        .date-display { font-size: 19px; font-weight: bold; color: var(--saudi-green); margin-bottom: 5px; }
        body.dark .date-display { color: var(--gold); }
        .btn-gps { width: 100%; padding: 12px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <div style="font-size: 14px; color: #bbb;" id="status">مواقيت أم القرى</div>
        <div class="prayer-grid" id="prayerGrid">
            <!-- عرض مؤقت حتى يتم التحميل -->
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="isha">--:--</span></div>
        </div>
    </div>

    <div class="info-area">
        <div class="date-display" id="hijriDate">جاري تحديث التاريخ...</div>
        <div id="geoStatus" style="font-size: 12px; color: #888;">📍 مكة المكرمة (افتراضي)</div>
        <button class="btn-gps" onclick="getLocation()">📍 تحديث حسب موقعك الحالي</button>
    </div>
</div>

<script>
    // تحديث تاريخ أم القرى فوراً من جهاز المستخدم
    function updateDate() {
        try {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', options).format(new Date());
            document.getElementById('hijriDate').innerText = hijri;
        } catch (e) {
            document.getElementById('hijriDate').innerText = new Date().toLocaleDateString('ar-SA');
        }
    }

    // جلب المواقيت من API رسمي (طريقة أم القرى رقم 4)
    async function fetchPrayers(lat = 21.4225, lon = 39.8262) {
        document.getElementById('status').innerText = "جاري التحديث...";
        try {
            const response = await fetch(`https://api.aladhan.com{lat}&longitude=${lon}&method=4`);
            const data = await response.json();
            const t = data.data.timings;
            
            document.getElementById('fajr').innerText = t.Fajr;
            document.getElementById('dhuhr').innerText = t.Dhuhr;
            document.getElementById('asr').innerText = t.Asr;
            document.getElementById('maghrib').innerText = t.Maghrib;
            document.getElementById('isha').innerText = t.Isha;
            document.getElementById('status').innerText = "مواقيت أم القرى الرسمية";
        } catch (error) {
            document.getElementById('status').innerText = "خطأ في الاتصال";
        }
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetchPrayers(pos.coords.latitude, pos.coords.longitude);
                document.getElementById('geoStatus').innerText = "📍 تم التحديث حسب موقعك";
            }, () => {
                alert("يرجى تفعيل GPS للحصول على دقة أعلى");
            });
        }
    }

    // تشغيل فوري
    updateDate();
    fetchPrayers(); 
</script>

</body>
</html>
