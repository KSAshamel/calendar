<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; --neon-green: #39ff14; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); position: relative; }
        .prayer-header { background: #111; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer-label { font-size: 13px; color: #bbb; display: block; }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 22px; display: block; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.08); padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid transparent; }
        .prayer-item.active { border-color: var(--saudi-green); background: rgba(0, 108, 53, 0.3); }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }
        .controls-area { padding: 10px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city, .btn-gps { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; cursor: pointer; background: var(--card-bg); color: var(--text); }
        .btn-gps { background: var(--saudi-green); color: white; border: none; font-weight: bold; }
        .switch-mode { display: flex; justify-content: center; padding: 8px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: #333; }
        body.dark .toggle-btn { background: #444; color: #fff; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .month-label { font-weight: bold; font-size: 16px; color: var(--saudi-green); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px 10px; min-height: 250px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; cursor: pointer; position: relative; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        .event-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; margin-top: 2px; position: absolute; bottom: 2px; }
        .saudi-flag { width: 12px; height: 8px; background: var(--saudi-green); border: 1px solid white; margin-top: 2px; position: absolute; bottom: 2px; }
        .shamel-footer { padding: 20px 10px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { display: inline-block; width: 85%; padding: 14px 0; background: #2c2c2c; color: #fff !important; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px; border: 2px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); transition: 0.3s; }
        .event-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(34, 34, 34, 0.95); color: #fff; padding: 15px; border-radius: 10px; font-size: 14px; z-index: 100; display: none; text-align: center; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="dark">
<div class="calendar-card">
    <div id="eventPopup" class="event-popup" onclick="this.style.display='none'"></div>
    <div class="prayer-header">
        <span id="timer-label">جاري الحساب...</span>
        <span id="timer">00:00:00</span>
        <div class="prayer-grid">
            <div class="prayer-item" id="item-Fajr"><span class="p-n">الفجر</span><span class="p-t" id="val-Fajr">--:--</span></div>
            <div class="prayer-item" id="item-Dhuhr"><span class="p-n">الظهر</span><span class="p-t" id="val-Dhuhr">--:--</span></div>
            <div class="prayer-item" id="item-Asr"><span class="p-n">العصر</span><span class="p-t" id="val-Asr">--:--</span></div>
            <div class="prayer-item" id="item-Maghrib"><span class="p-n">المغرب</span><span class="p-t" id="val-Maghrib">--:--</span></div>
            <div class="prayer-item" id="item-Isha"><span class="p-n">العشاء</span><span class="p-t" id="val-Isha">--:--</span></div>
        </div>
    </div>
    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="updatePrayers(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
            <option value="Buraidah">بريدة</option>
            <option value="Hail">حائل</option>
            <option value="Jizan">جيزان</option>
            <option value="Najran">نجران</option>
            <option value="Sakaka">سكاكا</option>
            <option value="Arar">عرعر</option>
        </select>
        <button class="btn-gps" onclick="syncWithGPS()">📍 تحديد المدينة الأقرب تلقائياً</button>
        <div class="switch-mode">
            <button class="toggle-btn" id="calBtn" onclick="toggleCalendar()">التبديل للميلادي</button>
            <button class="toggle-btn" onclick="document.body.classList.toggle('dark')">🌗 الوضع الليلي</button>
        </div>
    </div>
    <div class="header">
        <button class="toggle-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="toggle-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
    <div class="shamel-footer">
        <a href="https://ksashamel.github.io/shamel/" target="_blank" class="btn-shamel">شامل</a>
    </div>
</div>

<script>
    let viewDate = new Date(), isHijri = true, prayerTimes = {Fajr:"05:30", Dhuhr:"12:30", Asr:"15:45", Maghrib:"18:15", Isha:"19:45"};
    const coords = { Makkah:[21.42, 39.82], Riyadh:[24.71, 46.67], Medina:[24.46, 39.60], Jeddah:[21.54, 39.17], Dammam:[26.42, 50.08], Abha:[18.21, 42.50], Tabuk:[28.38, 36.56], Buraidah:[26.32, 43.97], Hail:[27.52, 41.69], Jizan:[16.88, 42.55], Najran:[17.49, 44.12], Sakaka:[29.96, 40.20], Arar:[30.97, 41.03] };
    const holyEvents = { hijri: { '9-1': 'بداية شهر رمضان المبارك 🌙', '10-1': 'عيد الفطر المبارك 🎇', '12-9': 'يوم عرفة 🕋', '12-10': 'عيد الأضحى المبارك 🐏' }, greg: { '9-23': 'اليوم الوطني السعودي 🇸🇦', '2-22': 'يوم التأسيس السعودي 🇸🇦', '3-11': 'يوم العلم السعودي 🇸🇦' } };
    const pNames = {Fajr:'الفجر',Dhuhr:'الظهر',Asr:'العصر',Maghrib:'المغرب',Isha:'العشاء'};

    async function updatePrayers(city, lat, lon) {
        let tLat = lat || coords[city], tLon = lon || coords[city];
        try {
            const r = await fetch(`https://api.aladhan.com{tLat}&longitude=${tLon}&method=4`);
            const d = await r.json();
            if(d.data) {
                prayerTimes = d.data.timings;
                ['Fajr','Dhuhr','Asr','Maghrib','Isha'].forEach(p => document.getElementById('val-'+p).innerText = prayerTimes[p]);
            }
        } catch(e) { console.error("API error"); }
        startCountdown();
    }

    function syncWithGPS() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                let nearest = 'Makkah', minD = Infinity;
                for(let c in coords) {
                    let d = Math.sqrt(Math.pow(p.coords.latitude-coords[c],2)+Math.pow(p.coords.longitude-coords[c],2));
                    if(d < minD) { minD = d; nearest = c; }
                }
                document.getElementById('citySelect').value = nearest;
                updatePrayers(nearest, p.coords.latitude, p.coords.longitude);
            });
        }
    }

    function startCountdown() {
        if(window.pT) clearInterval(window.pT);
        window.pT = setInterval(() => {
            const now = new Date(), list = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
            let lastP = null, nextP = null;

            for(let i=0; i<list.length; i++) {
                const [h,m] = prayerTimes[list[i]].split(':');
                const d = new Date(); d.setHours(h, m, 0);
                if(d < now) lastP = {n:list[i], t:d};
                if(d > now && !nextP) nextP = {n:list[i], t:d};
            }

            if(!lastP) { 
                const [h,m] = prayerTimes['Isha'].split(':');
                const d = new Date(); d.setDate(d.getDate()-1); d.setHours(h,m,0);
                lastP = {n:'Isha', t:d};
            }
            if(!nextP) {
                const [h,m] = prayerTimes['Fajr'].split(':');
                const d = new Date(); d.setDate(d.getDate()+1); d.setHours(h,m,0);
                nextP = {n:'Fajr', t:d};
            }

            const diffLast = now - lastP.t;
            const limit26Min = 26 * 60 * 1000;
            let displayLabel, diff;

            if (diffLast <= limit26Min) {
                displayLabel = `مضى على أذان ${pNames[lastP.n]}`;
                diff = diffLast;
                document.querySelectorAll('.prayer-item').forEach(i => i.classList.remove('active'));
                document.getElementById('item-'+lastP.n).classList.add('active');
            } else {
                displayLabel = `باقي على أذان ${pNames[nextP.n]}`;
                diff = nextP.t - now;
                document.querySelectorAll('.prayer-item').forEach(i => i.classList.remove('active'));
                document.getElementById('item-'+nextP.n).classList.add('active');
            }

            const hh = Math.floor(diff/3600000), mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000);
            document.getElementById('timer-label').innerText = displayLabel;
            document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }, 1000);
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = ['ح','ن','ث','ر','خ','ج','س'].map(d => `<div class="day-name">${d}</div>`).join('');
        const cal = isHijri ? 'islamic-umalqura' : 'gregory';
        document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat('ar-SA', {month:'long', year:'numeric', calendar:cal}).format(viewDate);
        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const days = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=days; d++) {
            const date = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
            const today = date.toDateString() === new Date().toDateString() ? 'today' : '';
            const hjParts = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {day:'numeric', month:'numeric'}).format(date).split('/');
            const hKey = `${hjParts[1]}-${hjParts[0]}`, gKey = `${date.getMonth()+1}-${d}`;
            const dayNum = isHijri ? new Intl.DateTimeFormat('ar-SA', {day:'numeric', calendar:cal}).format(date) : d;
            let icon = '', text = '';
            if(holyEvents.hijri[hKey]) { icon = '<div class="event-dot"></div>'; text = holyEvents.hijri[hKey]; }
            if(holyEvents.greg[gKey]) { icon = '<div class="saudi-flag"></div>'; text = holyEvents.greg[gKey]; }
            const cell = document.createElement('div'); cell.className = `day-cell ${today}`; cell.innerHTML = `<span>${dayNum}</span>${icon}`;
            if(text) cell.onclick = () => { const p = document.getElementById('eventPopup'); p.innerText = text; p.style.display = 'block'; setTimeout(()=>p.style.display='none', 3000); };
            grid.appendChild(cell);
        }
    }

    function toggleCalendar() { isHijri = !isHijri; document.getElementById('calBtn').innerText = isHijri ? "التبديل للميلادي" : "التبديل للهجري"; renderCalendar(); }
    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth()+s); renderCalendar(); }
    window.onload = () => { updatePrayers('Makkah'); renderCalendar(); };
</script>
</body>
</html>
