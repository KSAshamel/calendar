<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى - مع بوصلة القبلة</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        
        .prayer-header { background: #222; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 17px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 8px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 12px; font-weight: bold; color: var(--gold); }

        .controls-area { padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-family: inherit; font-size: 14px; }
        .btn-gps, .btn-qibla { width: 100%; padding: 10px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gps { background: var(--saudi-green); }
        .btn-qibla { background: #8e44ad; margin-top: 5px; }

        .switch-mode { display: flex; justify-content: center; padding: 10px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: #444; }
        body.dark .toggle-btn { background: #444; color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; position: relative; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        
        /* تصميم البوصلة */
        #qiblaModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .compass-container { background: white; padding: 30px; border-radius: 20px; text-align: center; position: relative; }
        .compass { width: 200px; height: 200px; border: 5px solid #333; border-radius: 50%; position: relative; margin: 20px auto; background: #f9f9f9; }
        .needle { width: 4px; height: 100px; background: red; position: absolute; left: 50%; bottom: 50%; transform-origin: bottom center; transition: 0.5s; }
        .needle::after { content: '🕋'; position: absolute; top: -20px; left: -8px; font-size: 20px; }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="prayer-header">
        <div id="countdown">باقي على أذان <span id="next-p-name">--</span> <span id="timer">00:00:00</span></div>
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>

    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="updateByManualSelection(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
        </select>
        <button class="btn-gps" onclick="syncLocation()">📍 تحديد أقرب مدينة تلقائياً</button>
        <button class="btn-qibla" onclick="openQibla()">🕋 بوصلة اتجاه القبلة</button>
        <div id="current-location-display" style="text-align:center; font-size:12px; margin-top:5px;">مكة المكرمة</div>
    </div>

    <div class="switch-mode">
        <button class="toggle-btn" onclick="toggleMode()">التبديل للميلادي</button>
        <button class="toggle-btn" onclick="toggleDark()">🌙 الوضع الليلي</button>
    </div>

    <div class="header">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
</div>

<!-- واجهة البوصلة المنبثقة -->
<div id="qiblaModal">
    <div class="compass-container">
        <h3>اتجاه القبلة</h3>
        <p id="qiblaAngleText">جاري الحساب...</p>
        <div class="compass">
            <div id="qiblaNeedle" class="needle"></div>
        </div>
        <button class="toggle-btn" onclick="closeQibla()">إغلاق</button>
    </div>
</div>

<script>
    let viewDate = new Date(), isHijri = true, countdownInterval;
    const makkah = { lat: 21.4225, lon: 39.8262 };

    const saudiCitiesData = {
        Makkah: { name: "مكة المكرمة", lat: 21.42, lon: 39.82, Fajr: "05:18", Dhuhr: "12:28", Asr: "15:48", Maghrib: "18:22", Isha: "19:52" },
        Riyadh: { name: "الرياض", lat: 24.71, lon: 46.67, Fajr: "04:55", Dhuhr: "12:05", Asr: "15:25", Maghrib: "17:58", Isha: "19:28" },
        Medina: { name: "المدينة المنورة", lat: 24.46, lon: 39.61, Fajr: "05:22", Dhuhr: "12:30", Asr: "15:52", Maghrib: "18:25", Isha: "19:55" },
        Jeddah: { name: "جدة", lat: 21.54, lon: 39.17, Fajr: "05:21", Dhuhr: "12:31", Asr: "15:51", Maghrib: "18:25", Isha: "19:55" },
        Dammam: { name: "الدمام", lat: 26.42, lon: 50.08, Fajr: "04:42", Dhuhr: "11:53", Asr: "15:12", Maghrib: "17:46", Isha: "19:16" },
        Abha: { name: "أبها", lat: 18.21, lon: 42.50, Fajr: "05:12", Dhuhr: "12:22", Asr: "15:42", Maghrib: "18:15", Isha: "19:45" },
        Tabuk: { name: "تبوك", lat: 28.38, lon: 36.56, Fajr: "05:45", Dhuhr: "12:45", Asr: "16:10", Maghrib: "18:45", Isha: "20:15" }
    };

    let userPos = { lat: 21.42, lon: 39.82 }; // مكة افتراضياً

    function calculateQibla(lat, lon) {
        const dLon = (makkah.lon - lon) * Math.PI / 180;
        const y = Math.sin(dLon);
        const x = Math.cos(lat * Math.PI / 180) * Math.tan(makkah.lat * Math.PI / 180) - Math.sin(lat * Math.PI / 180) * Math.cos(dLon);
        let qibla = Math.atan2(y, x) * 180 / Math.PI;
        return (qibla + 360) % 360;
    }

    function openQibla() {
        document.getElementById('qiblaModal').style.display = 'flex';
        const angle = calculateQibla(userPos.lat, userPos.lon);
        document.getElementById('qiblaNeedle').style.transform = `rotate(${angle}deg)`;
        document.getElementById('qiblaAngleText').innerText = `القبلة بزاوية ${Math.round(angle)}° من الشمال`;
    }

    function closeQibla() { document.getElementById('qiblaModal').style.display = 'none'; }

    function updateByManualSelection(cityId) {
        const city = saudiCitiesData[cityId];
        userPos = { lat: city.lat, lon: city.lon };
        document.getElementById('current-location-display').innerText = city.name;
        ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(p => document.getElementById(p).innerText = city[p]);
        startCountdown();
    }

    function syncLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                document.getElementById('current-location-display').innerText = "موقعك الحالي (GPS)";
                openQibla(); // عرض القبلة فور المزامنة
            });
        }
    }

    // (دوال التقويم والعد التنازلي المعتادة تتبع هنا بنفس المنطق السابق...)
    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            const now = new Date();
            // ... منطق التوقيت ...
        }, 1000);
    }

    function render() {
        // ... منطق رسم التقويم ...
    }

    window.onload = () => { render(); updateByManualSelection('Makkah'); };
</script>
</body>
</html>
