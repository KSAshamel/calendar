<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى الذاتي</title>
    <style>
        :root { --saudi-green: #006C35; --gold: #ffd700; --bg: #121212; --card-bg: #1e1e1e; --text: #eee; --border: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid var(--border); }
        .prayer-header { background: #000; padding: 25px; text-align: center; border-bottom: 4px solid var(--saudi-green); }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; }
        .prayer-item { background: #2a2a2a; padding: 10px 2px; border-radius: 8px; border: 1px solid #3d3d3d; }
        .p-n { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .p-t { display: block; font-size: 14px; font-weight: bold; color: var(--gold); }
        .info-area { padding: 25px; text-align: center; }
        .date-display { font-size: 22px; font-weight: bold; color: var(--gold); margin-bottom: 15px; }
        .btn-update { width: 100%; padding: 15px; background: var(--saudi-green); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; box-shadow: 0 4px 15px rgba(0,108,53,0.4); }
        #city-label { font-size: 13px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="prayer-header">
        <div style="font-size: 14px; color: var(--saudi-green); font-weight: bold;">مواقيت أم القرى الرسمية</div>
        <div class="prayer-grid" id="prayerGrid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="isha">--:--</span></div>
        </div>
    </div>

    <div class="info-area">
        <div class="date-display" id="hijriDate">جاري الحساب...</div>
        <button class="btn-update" onclick="getLocation()">📍 تحديث حسب موقعي الآن</button>
        <span id="city-label">الموقع الحالي: مكة المكرمة (افتراضي)</span>
    </div>
</div>

<script>
    // 1. حساب التاريخ الهجري (أم القرى) محلياً
    function updateHijri() {
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', options);
        document.getElementById('hijriDate').innerText = formatter.format(new Date());
    }

    // 2. بيانات ثابتة لمكة (تعمل فوراً كحماية في حال تعطل الموقع)
    const makkahDefault = { Fajr: "05:31", Dhuhr: "12:35", Asr: "15:53", Maghrib: "18:20", Isha: "19:50" };

    function setTimes(t) {
        document.getElementById('fajr').innerText = t.Fajr || t.fajr;
        document.getElementById('dhuhr').innerText = t.Dhuhr || t.dhuhr;
        document.getElementById('asr').innerText = t.Asr || t.asr;
        document.getElementById('maghrib').innerText = t.Maghrib || t.maghrib;
        document.getElementById('isha').innerText = t.Isha || t.isha;
    }

    // 3. جلب المواقيت عند الضغط على الزر (اتصال سريع)
    async function getLocation() {
        if (navigator.geolocation) {
            document.getElementById('city-label').innerText = "⏳ جاري تحديد إحداثياتك...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                try {
                    const res = await fetch(`https://api.aladhan.com{lat}&longitude=${lon}&method=4`);
                    const data = await res.json();
                    setTimes(data.data.timings);
                    document.getElementById('city-label').innerText = "📍 تم التحديث بدقة لموقعك الحالي";
                } catch (e) {
                    alert("تعذر الاتصال بالسيرفر، تم عرض مواقيت مكة.");
                }
            }, () => alert("يرجى تفعيل الموقع (GPS)"));
        }
    }

    // تشغيل فوري عند الفتح
    window.onload = () => {
        updateHijri();
        setTimes(makkahDefault); // تظهر مواقيت مكة فوراً دون انتظار أي تحميل
    };
</script>

</body>
</html>
