<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: "Tahoma", sans-serif;
        background: #1e1e1e;
        color: #fff;
        margin: 0;
        padding: 0;
        font-size: 18px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #2c2c2c;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .topbar {
        background: #157347;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 26px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #44ff88;
        font-size: 24px;
        margin-bottom: 15px;
        line-height: 1.6;
    }

    #header button {
        padding: 10px 20px;
        margin: 4px;
        background: #198754;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
    }

    #header button:hover {
        background: #157347;
    }

    .switch-btn {
        background: #0d6efd;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        font-size: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #333;
        border-radius: 12px;
        overflow: hidden;
        font-size: 18px;
    }

    th {
        background: #157347;
        color: white;
        padding: 10px;
        font-size: 18px;
        border: 1px solid #444;
    }

    td {
        padding: 10px;
        text-align: center;
        border: 1px solid #555;
        height: 90px;
        vertical-align: top;
        background: #2c2c2c;
        font-size: 16px;
        color: white;
    }

    .day {
        font-size: 22px;
        font-weight: bold;
        color: #fff;
    }

    .hijri {
        font-size: 14px;
        color: #ccc;
        margin-top: 6px;
    }

    .today {
        background: #295f2d !important;
        border: 2px solid #44ff88 !important;
        box-shadow: 0 0 8px rgba(0,255,100,0.4);
    }

    .event-national {
        background: #003300 !important;
        border: 2px solid #00cc44 !important;
    }

    .event-religious {
        background: #4b2e19 !important;
        border: 2px solid #d2a679 !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 6px;
        padding: 3px 6px;
        background: #000;
        color: white;
        font-size: 12px;
        border-radius: 6px;
        font-weight: bold;
    }

    #date-diff-box select,
    #date-diff-box input[type="date"] {
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        margin-top: 6px;
        margin-bottom: 6px;
        width: 180px;
    }

    #date-diff-box h3 {
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<div class="topbar">
    التقويم
</div>

<div class="container">

    <div id="header">

        <button class="switch-btn" onclick="toggleView()">🌐</button>

        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>

        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

    <!-- حساب البعد الزمني -->
    <hr style="margin:30px 0; border-color:#444;">

    <div id="date-diff-box" style="text-align:center; margin-top:10px;">
        <h3 style="color:#44ff88;">حساب البعد الزمني</h3>

        <div style="margin:10px 0;">
            <label>اختر نوع الحساب:</label><br><br>

            <label><input type="radio" name="mode" value="greg" checked> ميلادي</label>
            &nbsp;&nbsp;&nbsp;
            <label><input type="radio" name="mode" value="hijri"> هجري</label>
        </div>

        <!-- ميلادي -->
        <div id="gregorian-box">
            <div style="margin:10px 0;">
                <label>التاريخ الأول:</label><br>
                <input type="date" id="g1">
            </div>

            <div style="margin:10px 0;">
                <label>التاريخ الثاني:</label><br>
                <input type="date" id="g2">
            </div>
        </div>

        <!-- هجري -->
        <div id="hijri-box" style="display:none;">
            <div style="margin:10px 0;">
                <label>التاريخ الأول:</label><br>
                <select id="h1d"></select>
                <select id="h1m"></select>
                <select id="h1y"></select>
            </div>

            <div style="margin:10px 0;">
                <label>التاريخ الثاني:</label><br>
                <select id="h2d"></select>
                <select id="h2m"></select>
                <select id="h2y"></select>
            </div>
        </div>

        <button onclick="calculateDateDiff()" 
                style="padding:10px 20px; font-size:18px; background:#198754; color:white; border:none; border-radius:8px; cursor:pointer;">
            احسب
        </button>

        <div id="diff-result" style="margin-top:15px; font-size:18px; color:#fff;"></div>
    </div>

</div>

<script>
let viewMode = "hijri";

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

let hijriYear, hijriMonth;

const events = [
    { name: "اليوم الوطني السعودي", date: "23-09", type: "national" },
    { name: "يوم التأسيس", date: "22-02", type: "national" },
    { name: "يوم العلم السعودي", date: "11-03", type: "national" },

    { name: "يوم عاشوراء", hijri: "10-01", type: "religious" },
    { name: "بداية رمضان", hijri: "01-09", type: "religious" },
    { name: "عيد الفطر", hijri: "01-10", type: "religious" },
    { name: "وقفة عرفة", hijri: "09-12", type: "religious" },
    { name: "عيد الأضحى", hijri: "10-12", type: "religious" }
];

function formatArabicNumber(num) {
    return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

async function getHijri(day, month, year) {
    const r = await fetch(`https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`);
    const j = await r.json();
    return j.data.hijri;
}

function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    if (viewMode === "gregorian") {
        generateCalendar();
    } else {
        convertToHijriAndShow();
    }
}

function prevMonth() {
    if (viewMode === "gregorian") {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        generateCalendar();
    } else {
        hijriMonth--;
        if (hijriMonth < 1) { hijriMonth = 12; hijriYear--; }
        generateHijriMonth();
    }
}

function nextMonth() {
    if (viewMode === "gregorian") {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        generateCalendar();
    } else {
        hijriMonth++;
        if (hijriMonth > 12) { hijriMonth = 1; hijriYear++; }
        generateHijriMonth();
    }
}

function toggleView() {
    viewMode = (viewMode === "gregorian") ? "hijri" : "gregorian";
    if (viewMode === "gregorian") {
        generateCalendar();
    } else {
        convertToHijriAndShow();
    }
}

async function convertToHijriAndShow() {
    const t = new Date();
    const h = await getHijri(t.getDate(), t.getMonth()+1, t.getFullYear());
    hijriYear = parseInt(h.year);
    hijriMonth = parseInt(h.month.number);
    generateHijriMonth();
}

async function generateCalendar() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>Sunday</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
            <th>Saturday</th>
        </tr>
    `;

    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    document.getElementById("title").innerHTML =
        `${monthNames[currentMonth]} (${currentMonth+1}) ${currentYear}`;

    const year = currentYear;
    const month = currentMonth;

    const first = new Date(year, month, 1).getDay();
    const days = new Date(year, month+1, 0).getDate();

    const today = new Date();
    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";
    let row = document.createElement("tr");

    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    for (let d=1; d<=days; d++) {
        const cell = document.createElement("td");
        const h = await getHijri(d, month+1, year);

        cell.innerHTML = `<div class="day">${d}</div><div class="hijri">${h.day}-${h.month.number} هـ</div>`;

        const gKey = `${String(d).padStart(2,"0")}-${String(month+1).padStart(2,"0")}`;
        const hKey = `${String(h.day).padStart(2,"0")}-${String(h.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.date === gKey || e.hijri === hKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + d) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

async function generateHijriMonth() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th>
            <th>الاثنين</th>
            <th>الثلاثاء</th>
            <th>الأربعاء</th>
            <th>الخميس</th>
            <th>الجمعة</th>
            <th>السبت</th>
        </tr>
    `;

    // تحويل أول يوم من الشهر الهجري إلى ميلادي لمعرفة بداية الأسبوع
    const r = await fetch(`https://api.aladhan.com/v1/hToG?date=1-${hijriMonth}-${hijriYear}`);
    const d = await r.json();
    const hInfo = d.data.hijri;
    const gInfo = d.data.gregorian;

    const displayedMonthName = hInfo.month.ar;
    const displayedMonthNumber = hInfo.month.number;

    document.getElementById("title").innerHTML =
        `${displayedMonthName} (${formatArabicNumber(displayedMonthNumber)}) ${formatArabicNumber(hijriYear)} هـ`;

    const first = new Date(gInfo.year, gInfo.month.number-1, gInfo.day).getDay();

    const today = new Date();
    const todayHijri = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    // نفترض 30 يومًا، ويمكنك تحسينها لاحقًا لو أردت
    for (let day=1; day<=30; day++) {
        const r2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${day}-${hijriMonth}-${hijriYear}`);
        const d2 = await r2.json();
        const g2 = d2.data.gregorian;

        const cell = document.createElement("td");
        cell.innerHTML = `
            <div class="day">${formatArabicNumber(day)} هـ</div>
            <div class="hijri">${g2.day}-${g2.month.number}-${g2.year} م</div>
        `;

        const hKey = `${String(day).padStart(2,"0")}-${String(hijriMonth).padStart(2,"0")}`;
        const gKey = `${String(g2.day).padStart(2,"0")}-${String(g2.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.hijri === hKey || e.date === gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (day === parseInt(todayHijri.day) &&
            hijriMonth === parseInt(todayHijri.month.number) &&
            hijriYear === parseInt(todayHijri.year)) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + day) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* إعداد اختيار نوع الحساب (ميلادي/هجري) */
function setupModeToggle() {
    document.querySelectorAll("input[name='mode']").forEach(r=>{
        r.addEventListener("change", ()=>{
            if (r.value === "greg") {
                document.getElementById("gregorian-box").style.display = "block";
                document.getElementById("hijri-box").style.display = "none";
            } else {
                document.getElementById("gregorian-box").style.display = "none";
                document.getElementById("hijri-box").style.display = "block";
            }
        });
    });
}

/* إنشاء قوائم التاريخ الهجري (يوم/شهر/سنة) */
async function setupHijriSelectors() {
    const today = new Date();
    const h = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());
    const currentHijriYear = parseInt(h.year);

    const years = [];
    for (let y = currentHijriYear - 50; y <= currentHijriYear + 50; y++) {
        years.push(y);
    }

    const days = [];
    for (let i=1;i<=30;i++) days.push(i);

    const months = [];
    for (let i=1;i<=12;i++) months.push(i);

    function fill(id, arr) {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        arr.forEach(v=>{
            const o = document.createElement("option");
            o.value = v;
            o.textContent = v;
            sel.appendChild(o);
        });
    }

    fill("h1d", days);
    fill("h2d", days);
    fill("h1m", months);
    fill("h2m", months);
    fill("h1y", years);
    fill("h2y", years);

    // تعيين القيم الافتراضية على اليوم الحالي هجريًا
    document.getElementById("h1d").value = parseInt(h.day);
    document.getElementById("h1m").value = parseInt(h.month.number);
    document.getElementById("h1y").value = parseInt(h.year);

    document.getElementById("h2d").value = parseInt(h.day);
    document.getElementById("h2m").value = parseInt(h.month.number);
    document.getElementById("h2y").value = parseInt(h.year);
}

/* حساب البعد الزمني */
async function calculateDateDiff() {
    const mode = document.querySelector("input[name='mode']:checked").value;

    if (mode === "greg") {
        const d1 = document.getElementById("g1").value;
        const d2 = document.getElementById("g2").value;

        if (!d1 || !d2) {
            document.getElementById("diff-result").innerHTML = "الرجاء اختيار التاريخين.";
            return;
        }

        const date1 = new Date(d1);
        const date2 = new Date(d2);

        showDiff(Math.abs(date2 - date1));

    } else {
        const d1 = document.getElementById("h1d").value;
        const m1 = document.getElementById("h1m").value;
        const y1 = document.getElementById("h1y").value;

        const d2 = document.getElementById("h2d").value;
        const m2 = document.getElementById("h2m").value;
        const y2 = document.getElementById("h2y").value;

        if (!d1 || !m1 || !y1 || !d2 || !m2 || !y2) {
            document.getElementById("diff-result").innerHTML = "الرجاء اختيار التاريخين.";
            return;
        }

        const g1 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d1}-${m1}-${y1}`).then(r=>r.json());
        const g2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d2}-${m2}-${y2}`).then(r=>r.json());

        const date1 = new Date(g1.data.gregorian.date);
        const date2 = new Date(g2.data.gregorian.date);

        showDiff(Math.abs(date2 - date1));
    }
}

function showDiff(diffTime) {
    let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let years = Math.floor(diffDays / 365);
    let months = Math.floor((diffDays % 365) / 30);
    let days = diffDays - (years * 365) - (months * 30);

    document.getElementById("diff-result").innerHTML = `
        الفرق:<br>
        ${years} سنة — ${months} شهر — ${days} يوم<br>
        (إجمالي الأيام: ${diffDays})
    `;
}

/* تشغيل كل شيء عند تحميل الصفحة */
window.onload = async () => {
    setupModeToggle();
    await setupHijriSelectors();
    await convertToHijriAndShow();
};
</script>

</body>
</html>
