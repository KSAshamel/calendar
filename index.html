<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: Tahoma, Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
        margin: 0;
        padding: 0;
        font-size: 18px;
    }

    .container {
        max-width: 1000px;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .topbar {
        background: #4a6fa5;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: bold;
        border-bottom: 4px solid #3b5a85;
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #4a6fa5;
        font-size: 26px;
        margin-bottom: 15px;
    }

    #header button {
        padding: 10px 20px;
        margin: 4px;
        background: #4a6fa5;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
    }

    #header button:hover {
        background: #3b5a85;
    }

    .switch-btn {
        background: #ffb703;
        color: #222;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        font-size: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        font-size: 18px;
    }

    th {
        background: #4a6fa5;
        color: white;
        padding: 12px;
        border: 1px solid #ddd;
    }

    td {
        padding: 12px;
        text-align: center;
        border: 1px solid #eee;
        height: 100px;
        vertical-align: top;
        background: #fafafa;
    }

    .day {
        font-size: 22px;
        font-weight: bold;
        color: #222;
    }

    .hijri {
        font-size: 14px;
        color: #666;
        margin-top: 6px;
    }

    .today {
        background: #e3f2fd !important;
        border: 2px solid #4a6fa5 !important;
    }

    .event-national {
        background: #fff4e6 !important;
        border: 2px solid #ffb703 !important;
    }

    .event-religious {
        background: #e8f5e9 !important;
        border: 2px solid #66bb6a !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 8px;
        background: #4a6fa5;
        color: white;
        font-size: 12px;
        border-radius: 6px;
        font-weight: bold;
    }

    #date-diff-box select {
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin: 5px;
        width: 120px;
    }

    #date-diff-box button {
        background: #4a6fa5;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
    }

    #date-diff-box button:hover {
        background: #3b5a85;
    }
</style>
</head>

<body>

<div class="topbar">التقويم</div>

<div class="container">

    <div id="header">
        <button class="switch-btn" onclick="toggleView()">🌐</button>
        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>
        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

    <hr style="margin:30px 0; border-color:#ddd;">

    <div id="date-diff-box" style="text-align:center;">
        <h3 style="color:#4a6fa5;">حساب البعد الزمني</h3>

        <label><input type="radio" name="mode" value="greg" checked> ميلادي</label>
        &nbsp;&nbsp;
        <label><input type="radio" name="mode" value="hijri"> هجري</label>

        <div id="gregorian-box" style="margin-top:15px;">
            <label>التاريخ الأول:</label><br>
            <select id="g1d"></select>
            <select id="g1m"></select>
            <select id="g1y"></select>

            <br><br>

            <label>التاريخ الثاني:</label><br>
            <select id="g2d"></select>
            <select id="g2m"></select>
            <select id="g2y"></select>
        </div>

        <div id="hijri-box" style="display:none; margin-top:15px;">
            <label>التاريخ الأول:</label><br>
            <select id="h1d"></select>
            <select id="h1m"></select>
            <select id="h1y"></select>

            <br><br>

            <label>التاريخ الثاني:</label><br>
            <select id="h2d"></select>
            <select id="h2m"></select>
            <select id="h2y"></select>
        </div>

        <button onclick="calculateDateDiff()" style="margin-top:15px;">احسب</button>

        <div id="diff-result" style="margin-top:15px; font-size:18px;"></div>
    </div>

</div>

<script>

/* ---------------------- المتغيرات العامة ---------------------- */

let viewMode = "hijri";
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let hijriYear, hijriMonth;

const events = [
    { name: "اليوم الوطني السعودي", date: "23-09", type: "national" },
    { name: "يوم التأسيس", date: "22-02", type: "national" },
    { name: "يوم العلم السعودي", date: "11-03", type: "national" },

    { name: "يوم عاشوراء", hijri: "10-01", type: "religious" },
    { name: "بداية رمضان", hijri: "01-09", type: "religious" },
    { name: "عيد الفطر", hijri: "01-10", type: "religious" },
    { name: "وقفة عرفة", hijri: "09-12", type: "religious" },
    { name: "عيد الأضحى", hijri: "10-12", type: "religious" }
];

/* ---------------------- دوال مساعدة ---------------------- */

function formatArabicNumber(num) {
    return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ---------------------- خوارزمية هجري بدون API ---------------------- */

const hijriMonthNames = [
    "محرم","صفر","ربيع الأول","ربيع الآخر","جمادى الأولى","جمادى الآخرة",
    "رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"
];

function hijriToGregorian(hDay, hMonth, hYear) {
    let jd = Math.floor((11 * hYear + 3) / 30) +
             354 * hYear +
             30 * hMonth +
             hDay + 1948440 - 385;

    let l = jd + 68569;
    let n = Math.floor((4 * l) / 146097);
    l = l - Math.floor((146097 * n + 3) / 4);
    let i = Math.floor((4000 * (l + 1)) / 1461001);
    l = l - Math.floor((1461 * i) / 4) + 31;
    let j = Math.floor((80 * l) / 2447);
    let day = l - Math.floor((2447 * j) / 80);
    l = Math.floor(j / 11);
    let month = j + 2 - 12 * l;
    let year = 100 * (n - 49) + i + l;

    return { day, month, year };
}

function approximateTodayHijri() {
    const g = new Date();
    const jd = Math.floor(g / 86400000) + 2440587;

    let l = jd - 1948440 + 10632;
    let n = Math.floor((l - 1) / 10631);
    l = l - 10631 * n + 354;
    let j = (Math.floor((10985 - l) / 5316)) *
            (Math.floor((50 * l) / 17719)) +
            (Math.floor(l / 5670)) *
            (Math.floor((43 * l) / 15238));
    l = l - (Math.floor((30 - j) / 15)) *
            (Math.floor((17719 * j) / 50)) -
            (Math.floor(j / 16)) *
            (Math.floor((15238 * j) / 43)) + 29;

    let month = Math.floor((24 * l) / 709);
    let day = l - Math.floor((709 * month) / 24);
    let year = 30 * n + j - 30;

    return { day, month, year };
}

/* ---------------------- التقويم الميلادي ---------------------- */

function generateCalendar() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
        </tr>
    `;

    const monthNames = [
        "يناير","فبراير","مارس","أبريل","مايو","يونيو",
        "يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"
    ];

    document.getElementById("title").innerHTML =
        `${monthNames[currentMonth]} ${currentYear}`;

    const first = new Date(currentYear, currentMonth, 1).getDay();
    const days = new Date(currentYear, currentMonth+1, 0).getDate();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const today = new Date();

    for (let d=1; d<=days; d++) {
        const cell = document.createElement("td");

        cell.innerHTML = `<div class="day">${d}</div>`;

        const gKey = `${String(d).padStart(2,"0")}-${String(currentMonth+1).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.date === gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + d) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* ---------------------- التقويم الهجري ---------------------- */

function generateHijriMonth() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
        </tr>
    `;

    document.getElementById("title").innerHTML =
        `${hijriMonthNames[hijriMonth-1]} ${hijriYear} هـ`;

    const gStart = hijriToGregorian(1, hijriMonth, hijriYear);
    const first = new Date(gStart.year, gStart.month - 1, gStart.day).getDay();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const todayHijri = approximateTodayHijri();

    for (let day=1; day<=30; day++) {
        const g = hijriToGregorian(day, hijriMonth, hijriYear);

        const cell = document.createElement("td");
        cell.innerHTML = `
            <div class="day">${formatArabicNumber(day)}</div>
            <div class="hijri">${g.day}-${g.month}-${g.year} م</div>
        `;

        const hKey = `${String(day).padStart(2,"0")}-${String(hijriMonth).padStart(2,"0")}`;
        const gKey = `${String(g.day).padStart(2,"0")}-${String(g.month).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.hijri === hKey || e.date === gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (day == todayHijri.day &&
            hijriMonth == todayHijri.month &&
            hijriYear == todayHijri.year) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + day) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* ---------------------- التحكم ---------------------- */

function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();

    const h = approximateTodayHijri();
    hijriYear = h.year;
    hijriMonth = h.month;

    viewMode === "gregorian" ? generateCalendar() : generateHijriMonth();
}

function prevMonth() {
    if (viewMode === "gregorian") {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        generateCalendar();
    } else {
        hijriMonth--;
        if (hijriMonth < 1) { hijriMonth = 12; hijriYear--; }
        generateHijriMonth();
    }
}

function nextMonth() {
    if (viewMode === "gregorian") {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        generateCalendar();
    } else {
        hijriMonth++;
        if (hijriMonth > 12) { hijriMonth = 1; hijriYear++; }
        generateHijriMonth();
    }
}

function toggleView() {
    viewMode = (viewMode === "gregorian") ? "hijri" : "gregorian";
    viewMode === "gregorian" ? generateCalendar() : generateHijriMonth();
}

/* ---------------------- إعداد القوائم الميلادية ---------------------- */

function setupGregorianSelectors() {
    const today = new Date();
    const currentYear = today.getFullYear();

    const years = [];
    for (let y = currentYear - 50; y <= currentYear + 50; y++)
