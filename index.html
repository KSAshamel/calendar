<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى الذكي - النسخة الشاملة</title>

    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .calendar-card { background: white; width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ddd; }

        #countdown-box { background: #222; color: #fff; text-align: center; padding: 12px; font-size: 14px; border-bottom: 2px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 17px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .month-label { font-size: 1.1rem; font-weight: bold; color: #333; }
        .nav-btn { cursor: pointer; border: none; background: #f0f0f0; padding: 8px 14px; border-radius: 6px; font-size: 16px; }

        .controls-area { padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        .btn-gps { width: 100%; padding: 10px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .switch-mode { display: flex; justify-content: center; padding: 10px; background: #fff; }
        .toggle-btn { cursor: pointer; padding: 6px 20px; background: #eee; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; color: #444; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; background: #fff; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        .day-cell.other-month { opacity: 0.2; }

        .prayer-section { padding: 15px; background: #fff; border-top: 1px solid #eee; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .prayer-item { background: #f9f9f9; padding: 8px 2px; border-radius: 6px; text-align: center; border: 1px solid #eee; }
        .p-n { display: block; font-size: 10px; color: #888; }
        .p-t { display: block; font-size: 12px; font-weight: bold; color: var(--saudi-green); }

        #status { font-size: 11px; text-align: center; margin-top: 2px; color: #666; font-weight: bold; min-height: 15px; }
    </style>
</head>

<body>

<div class="calendar-card">

    <div id="countdown-box">الأذان القادم: <span id="next-p-name">--</span> خلال <span id="timer">00:00:00</span></div>

    <div class="header">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="fetchByCity(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
        </select>

        <button class="btn-gps" onclick="getLocation()">📍 استخدام موقعي الحالي</button>
        <div id="status"></div>
    </div>

    <div class="switch-mode">
        <div class="toggle-btn" id="modeBtn" onclick="toggleMode()">التبديل للميلادي</div>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div class="prayer-section">
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>

</div>

<script>

    let viewDate = new Date();
    let isHijri = true;
    let prayerTimes = {};
    let countdownInterval;

    async function safeFetch(apiUrl) {
        const status = document.getElementById('status');
        status.innerText = "جاري المزامنة...";

        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data && data.data) {
                prayerTimes = data.data.timings;

                ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(p => {
                    document.getElementById(p).innerText = prayerTimes[p].substring(0, 5);
                });

                status.innerText = "تم التحديث بنجاح ✅";
                startCountdown();
            }
        } catch (e) {
            status.innerText = "⚠️ فشل الجلب التلقائي. تأكد من الإنترنت.";
        }
    }

    function fetchByCity(city) {
        safeFetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=SA&method=4`);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                safeFetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=4`);
            }, () => alert("يرجى تفعيل الموقع"));
        }
    }

    function startCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);

        countdownInterval = setInterval(() => {
            const now = new Date();
            const pList = [
                { n: 'الفجر', t: prayerTimes.Fajr },
                { n: 'الظهر', t: prayerTimes.Dhuhr },
                { n: 'العصر', t: prayerTimes.Asr },
                { n: 'المغرب', t: prayerTimes.Maghrib },
                { n: 'العشاء', t: prayerTimes.Isha }
            ];

            let next = null;

            for (let p of pList) {
                const [h, m] = p.t.split(':');
                const d = new Date();
                d.setHours(h, m, 0);

                if (d > now) {
                    next = { ...p, d: d };
                    break;
                }
            }

            if (!next) {
                const [h, m] = pList[0].t.split(':');
                const d = new Date();
                d.setDate(d.getDate() + 1);
                d.setHours(h, m, 0);
                next = { ...pList[0], d: d };
            }

            const diff = next.d - now;
            const hh = String(Math.floor(diff / 3600000)).padStart(2, '0');
            const mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            const ss = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

            document.getElementById('next-p-name').innerText = next.n;
            document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
        }, 1000);
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        ['ح','ن','ث','ر','خ','ج','س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);

        const lang = isHijri ? 'ar-SA-u-ca-islamic-umalqura' : 'ar-SA';
        document.getElementById('monthDisplay').innerText =
            new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(viewDate);

        document.getElementById('modeBtn').innerText =
            isHijri ? "التبديل للميلادي" : "التبديل للهجري";

        let temp = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);

        if (isHijri) {
            for (let i = 0; i < 32; i++) {
                if (parseInt(new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day: 'numeric' }).format(temp)) === 1)
                    break;
                temp.setDate(temp.getDate() - 1);
            }
        }

        let offset = temp.getDay();

        for (let i = 0; i < 35; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';

            let d = new Date(temp);
            d.setDate(d.getDate() + (i - offset));

            cell.innerText = new Intl.DateTimeFormat(
                isHijri ? 'en-u-ca-islamic-umalqura' : 'en-US',
                { day: 'numeric' }
            ).format(d);

            if (d.toDateString() === new Date().toDateString())
                cell.classList.add('today');

            grid.appendChild(cell);
        }
    }

    function toggleMode() {
        isHijri = !isHijri;
        render();
    }

    function changeMonth(n) {
        if (isHijri)
            viewDate.setDate(viewDate.getDate() + (n * 30));
        else
            viewDate.setMonth(viewDate.getMonth() + n);

        render();
    }

    window.onload = () => {
        render();
        fetchByCity('Makkah');
    };

</script>

</body>
</html>
