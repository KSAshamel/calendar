<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; --neon-green: #39ff14; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .prayer-header { background: #111; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer-label { font-size: 13px; color: #bbb; display: block; margin-bottom: 2px; }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 20px; display: block; }
        
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.08); padding: 5px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }

        .controls-area { padding: 10px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 14px; cursor: pointer; outline: none; }
        
        .switch-mode { display: flex; justify-content: center; padding: 8px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: #333; }
        body.dark .toggle-btn { background: #444; color: #fff; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .month-label { font-weight: bold; font-size: 16px; color: var(--saudi-green); }
        body.dark .month-label { color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px 10px; min-height: 250px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }

        .shamel-footer { padding: 20px 10px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { 
            display: inline-block; width: 85%; padding: 14px 0; 
            background: #2c2c2c; color: #ffffff !important; 
            text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px;
            border: 2px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); 
            transition: 0.3s; cursor: pointer;
        }
        .btn-shamel:hover { background: #1a1a1a; box-shadow: 0 0 20px rgba(57, 255, 20, 0.7); }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <span id="timer-label">باقي على الأذان القادم</span>
        <span id="timer">00:00:00</span>
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>

    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="updatePrayers(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
            <option value="Buraidah">بريدة</option>
            <option value="Hail">حائل</option>
            <option value="Jizan">جيزان</option>
            <option value="Najran">نجران</option>
            <option value="Sakaka">سكاكا</option>
            <option value="Arar">عرعر</option>
            <option value="AlBahah">الباحة</option>
        </select>
        
        <div class="switch-mode">
            <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()">☀️ الوضع النهاري</button>
            <button class="toggle-btn" id="calBtn" onclick="toggleCalendar()">التبديل للميلادي</button>
        </div>
    </div>

    <div class="header">
        <button class="toggle-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="toggle-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div class="shamel-footer">
        <a href="https://ksashamel.github.io/shamel/" target="_blank" class="btn-shamel">شامل</a>
    </div>
</div>

<script>
    let viewDate = new Date(), isHijri = true, timerInterval;
    const saudiCities = {
        Makkah: { Fajr: "05:33", Dhuhr: "12:35", Asr: "15:52", Maghrib: "18:19", Isha: "19:49" },
        Riyadh: { Fajr: "05:07", Dhuhr: "12:08", Asr: "15:24", Maghrib: "17:49", Isha: "19:19" },
        Medina: { Fajr: "05:35", Dhuhr: "12:36", Asr: "15:51", Maghrib: "18:17", Isha: "19:47" },
        Jeddah: { Fajr: "05:38", Dhuhr: "12:37", Asr: "15:55", Maghrib: "18:22", Isha: "19:52" },
        Dammam: { Fajr: "04:54", Dhuhr: "11:54", Asr: "15:08", Maghrib: "17:33", Isha: "19:03" },
        Abha: { Fajr: "05:21", Dhuhr: "12:25", Asr: "15:44", Maghrib: "18:12", Isha: "19:42" },
        Tabuk: { Fajr: "05:49", Dhuhr: "12:48", Asr: "16:01", Maghrib: "18:26", Isha: "19:56" },
        Buraidah: { Fajr: "05:18", Dhuhr: "12:18", Asr: "15:32", Maghrib: "17:58", Isha: "19:28" },
        Hail: { Fajr: "05:28", Dhuhr: "12:27", Asr: "15:41", Maghrib: "18:06", Isha: "19:36" },
        Jizan: { Fajr: "05:21", Dhuhr: "12:25", Asr: "15:45", Maghrib: "18:15", Isha: "19:45" },
        Najran: { Fajr: "05:14", Dhuhr: "12:17", Asr: "15:37", Maghrib: "18:06", Isha: "19:36" },
        Sakaka: { Fajr: "05:41", Dhuhr: "12:36", Asr: "15:56", Maghrib: "18:14", Isha: "19:44" },
        Arar: { Fajr: "05:35", Dhuhr: "12:30", Asr: "15:50", Maghrib: "18:05", Isha: "19:35" },
        AlBahah: { Fajr: "05:23", Dhuhr: "12:27", Asr: "15:48", Maghrib: "18:16", Isha: "19:46" }
    };

    function updatePrayers(city) {
        const t = saudiCities[city];
        const fmt = (hm) => { let [h, m] = hm.split(':'); return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`; };
        ['Fajr','Dhuhr','Asr','Maghrib','Isha'].forEach(p => document.getElementById(p).innerText = fmt(t[p]));
        startSmartTimer(t);
    }

    function startSmartTimer(timings) {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = new Date();
            let next = null, last = null, minDiff = Infinity;
            for (let p in timings) {
                const [h, m] = timings[p].split(':'), pDate = new Date();
                pDate.setHours(h, m, 0);
                const diff = pDate - now;
                if (diff > 0 && diff < minDiff) { minDiff = diff; next = p; }
                if (diff <= 0) last = p;
            }
            const label = document.getElementById('timer-label'), timer = document.getElementById('timer');
            if (last) {
                const [h, m] = timings[last].split(':'), lastDate = new Date();
                lastDate.setHours(h, m, 0);
                const elapsedMin = (now - lastDate) / 60000;
                if (elapsedMin <= 26) { label.innerText = "مضى على الأذان"; timer.innerText = formatTime(now - lastDate); return; }
            }
            label.innerText = "باقي على الأذان القادم";
            if (!next) {
                const [h, m] = timings.Fajr.split(':'), fDate = new Date(); fDate.setDate(fDate.getDate()+1); fDate.setHours(h, m, 0);
                timer.innerText = formatTime(fDate - now);
            } else {
                const [h, m] = timings[next].split(':'), nDate = new Date(); nDate.setHours(h, m, 0);
                timer.innerText = formatTime(nDate - now);
            }
        }, 1000);
    }

    function formatTime(ms) {
        const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function toggleCalendar() { isHijri = !isHijri; document.getElementById('calBtn').innerText = isHijri ? "التبديل للميلادي" : "التبديل للهجري"; renderCalendar(); }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const cal = isHijri ? 'ar-SA-u-ca-islamic-umalqura' : 'ar-SA';
        const dFmt = new Intl.DateTimeFormat(cal, {month:'long', year:'numeric'});
        document.getElementById('monthDisplay').innerText = dFmt.format(viewDate);
        ['ح','ن','ث','ر','خ','ج','س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
        
        const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        const now = new Date();
        for(let d=1; d<=daysInMonth; d++) {
            const isToday = d===now.getDate() && viewDate.getMonth()===now.getMonth() && viewDate.getFullYear()===now.getFullYear();
            grid.innerHTML += `<div class="day-cell ${isToday?'today':''}">${d}</div>`;
        }
    }

    function toggleTheme() { document.body.classList.toggle('dark'); document.getElementById('themeBtn').innerText = document.body.classList.contains('dark') ? "☀️ الوضع النهاري" : "🌙 الوضع الليلي"; }
    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
    
    renderCalendar();
    updatePrayers('Makkah');
</script>
</body>
</html>
