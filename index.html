<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى - النسخة المستقرة</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .calendar-card { background: white; width: 100%; max-width: 450px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ddd; }
        
        #countdown-box { background: #222; color: #fff; text-align: center; padding: 12px; font-size: 14px; border-bottom: 2px solid var(--saudi-green); }
        #countdown-box span { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 16px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .month-label { font-size: 1.2rem; font-weight: bold; color: #333; }
        .nav-btn { cursor: pointer; border: none; background: #f5f5f5; padding: 8px 16px; border-radius: 6px; font-size: 18px; }

        .location-controls { padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .select-city { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; font-size: 14px; }
        .btn-gps { width: 100%; padding: 10px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; background: #fff; }
        .day-name { text-align: center; font-size: 12px; font-weight: bold; color: #999; padding: 10px 0; }
        .day-cell { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; position: relative; }
        .day-cell.today { border: 2px solid var(--primary); background: rgba(0, 120, 212, 0.05); }
        .day-num { font-size: 16px; font-weight: 600; }

        .prayer-section { padding: 15px; background: #fff; border-top: 1px solid #eee; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .prayer-item { background: #f9f9f9; padding: 10px 2px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .prayer-name { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .prayer-time { display: block; font-size: 12px; font-weight: bold; color: var(--saudi-green); }
        
        #status { font-size: 11px; text-align: center; color: #d32f2f; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="calendar-card">
    <div id="countdown-box">الصلاة القادمة: <span id="next-prayer-name">--</span> خلال <span id="timer">00:00:00</span></div>
    
    <div class="header">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="location-controls">
        <select class="select-city" id="citySelect" onchange="fetchByCity(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Madina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
            <option value="Buraidah">بريدة</option>
        </select>
        <button class="btn-gps" onclick="getLocation()">📍 استخدام موقعي الحالي</button>
        <div id="status"></div>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div class="prayer-section">
        <div class="prayer-grid">
            <div class="prayer-item"><span class="prayer-name">الفجر</span><span class="prayer-time" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="prayer-name">الظهر</span><span class="prayer-time" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="prayer-name">العصر</span><span class="prayer-time" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="prayer-name">المغرب</span><span class="prayer-time" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="prayer-name">العشاء</span><span class="prayer-time" id="Isha">--:--</span></div>
        </div>
    </div>
</div>

<script>
    let viewDate = new Date();
    let prayerTimes = {};
    let timerInterval;

    async function callApi(url) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "جاري الاتصال...";
        statusDiv.style.color = "orange";

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data && data.data) {
                prayerTimes = data.data.timings;
                updatePrayerUI();
                statusDiv.innerText = "تم التحديث بنجاح ✅";
                statusDiv.style.color = "green";
                setTimeout(() => statusDiv.innerText = "", 3000);
            }
        } catch (e) {
            statusDiv.innerText = "⚠️ تعذر الجلب التلقائي. تأكد من الإنترنت.";
            statusDiv.style.color = "red";
        }
    }

    function updatePrayerUI() {
        const ids = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
        ids.forEach(id => {
            if(prayerTimes[id]) document.getElementById(id).innerText = prayerTimes[id].substring(0, 5);
        });
        startCountdown();
    }

    function fetchByCity(city) {
        const url = `https://api.aladhan.com{city}&country=SA&method=4`;
        callApi(url);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const url = `https://api.aladhan.com{pos.coords.latitude}&longitude=${pos.coords.longitude}&method=4`;
                callApi(url);
            }, () => {
                document.getElementById('status').innerText = "⚠️ يرجى تفعيل الموقع في المتصفح.";
            });
        }
    }

    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (!prayerTimes.Fajr) return;
            const now = new Date();
            const prayers = [
                {n: 'الفجر', t: prayerTimes.Fajr},
                {n: 'الظهر', t: prayerTimes.Dhuhr},
                {n: 'العصر', t: prayerTimes.Asr},
                {n: 'المغرب', t: prayerTimes.Maghrib},
                {n: 'العشاء', t: prayerTimes.Isha}
            ];

            let next = null;
            for (let p of prayers) {
                const [h, m] = p.t.split(':');
                const pDate = new Date();
                pDate.setHours(parseInt(h), parseInt(m), 0);
                if (pDate > now) { next = { ...p, d: pDate }; break; }
            }

            if (!next) {
                const [h, m] = prayers[0].t.split(':');
                const pDate = new Date();
                pDate.setDate(pDate.getDate() + 1);
                pDate.setHours(parseInt(h), parseInt(m), 0);
                next = { ...prayers[0], d: pDate };
            }

            const diff = next.d - now;
            const hh = String(Math.floor(diff / 3600000)).padStart(2, '0');
            const mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            const ss = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

            document.getElementById('next-prayer-name').innerText = next.n;
            document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
        }, 1000);
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        ['ح', 'ن', 'ث', 'ر', 'خ', 'ج', 'س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
        const islamicFormat = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {month: 'long', year: 'numeric'});
        document.getElementById('monthDisplay').innerText = islamicFormat.format(viewDate);

        let temp = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
        let start = temp.getDay();
        for (let i = 0; i < 35; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            let d = new Date(temp);
            d.setDate(d.getDate() + (i - start));
            cell.innerHTML = `<span class="day-num">${new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {day: 'numeric'}).format(d)}</span>`;
            if (d.toDateString() === new Date().toDateString()) cell.classList.add('today');
            grid.appendChild(cell);
        }
    }

    function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCalendar(); }

    window.onload = () => { renderCalendar(); fetchByCity('Makkah'); };
</script>
</body>
</html>
