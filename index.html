<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        .prayer-header { background: #222; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 17px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 8px 2px; border-radius: 6px; text-align: center; transition: 0.3s; }
        .prayer-item.active { background: rgba(0, 108, 53, 0.4); border: 1px solid var(--saudi-green); }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 12px; font-weight: bold; color: var(--gold); }
        .controls-area { padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-family: inherit; font-size: 14px; }
        .btn-gps { width: 100%; padding: 10px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #current-location-display { text-align: center; font-size: 13px; font-weight: bold; color: var(--primary); padding: 5px; border-radius: 5px; background: rgba(0, 120, 212, 0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .nav-btn { cursor: pointer; border: none; background: #f0f0f0; padding: 8px 14px; border-radius: 6px; }
        body.dark .nav-btn { background: #444; color: #fff; }
        .switch-mode { display: flex; justify-content: center; padding: 10px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: #444; }
        body.dark .toggle-btn { background: #444; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; position: relative; border: 1px solid transparent; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        .day-num { font-weight: bold; }
        .shamel-footer { padding: 15px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { display: inline-block; width: 85%; padding: 12px 0; background: #2c2c2c; color: #fff !important; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px; border: 2px solid #39ff14; }
    </style>
</head>

<body class="dark">
<div class="calendar-card">

    <div class="prayer-header">
        <div id="countdown">باقي على أذان <span id="next-p-name">--</span> <span id="timer">00:00:00</span></div>
        <div class="prayer-grid">
            <div class="prayer-item" id="item-Fajr"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item" id="item-Dhuhr"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item" id="item-Asr"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item" id="item-Maghrib"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item" id="item-Isha"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>

    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="fetchPrayers(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Madinah">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
            <option value="Hail">حائل</option>
            <option value="Buraidah">بريدة</option>
            <option value="Jizan">جيزان</option>
            <option value="Najran">نجران</option>
            <option value="Sakaka">سكاكا</option>
            <option value="Arar">عرعر</option>
        </select>

        <button class="btn-gps" onclick="syncLocation()">📍 تحديد أقرب مدينة تلقائياً</button>
        <div id="current-location-display">المدينة الحالية: مكة المكرمة</div>
    </div>

    <div class="switch-mode">
        <button class="toggle-btn" id="modeBtn" onclick="toggleCalendarMode()">التبديل للميلادي</button>
        <button class="toggle-btn" onclick="document.body.classList.toggle('dark')">🌙 تبديل الوضع (ليلي/نهاري)</button>
    </div>

    <div class="header">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div class="shamel-footer">
        <a href="https://ksashamel.github.io/shamel/" target="_blank" class="btn-shamel">شامل</a>
    </div>

</div>

<script>

let viewDate = new Date(), isHijri = true, prayerTimes = {};
const namesAr = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};

async function fetchPrayers(city, lat = null, lon = null) {
    let url = (lat && lon)
        ? `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`
        : `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=SA&method=4`;

    try {
        const r = await fetch(url);
        const d = await r.json();
        prayerTimes = d.data.timings;

        if (!lat) {
            const select = document.getElementById('citySelect');
            document.getElementById('current-location-display').innerText =
                `المدينة الحالية: ${select.options[select.selectedIndex].text}`;
        }

        updatePrayerUI();
    } catch (e) {
        console.error("API Error:", e);
    }
}

function updatePrayerUI() {
    ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(p => {
        let [h, m] = prayerTimes[p].split(':');
        let hrs = parseInt(h);
        let ampm = hrs >= 12 ? 'م' : 'ص';
        hrs = hrs % 12 || 12;
        document.getElementById(p).innerText = `${hrs}:${m} ${ampm}`;
    });
    startCountdown();
}

function startCountdown() {
    clearInterval(window.timerInt);

    window.timerInt = setInterval(() => {
        if (!prayerTimes.Fajr) return;

        const now = new Date();
        const list = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];

        let next = null;
        let previous = null;

        for (let i = 0; i < list.length; i++) {
            let [h, m] = prayerTimes[list[i]].split(':');
            let t = new Date();
            t.setHours(parseInt(h), parseInt(m), 0);

            if (t > now) {
                next = { n: list[i], t: t };
                previous = i === 0 ? list[4] : list[i - 1];
                break;
            }
        }

        if (!next) {
            let [h, m] = prayerTimes['Fajr'].split(':');
            let t = new Date();
            t.setDate(t.getDate() + 1);
            t.setHours(parseInt(h), parseInt(m), 0);
            next = { n: 'Fajr', t: t };
            previous = 'Isha';
        }

        let [ph, pm] = prayerTimes[previous].split(':');
        let prevTime = new Date();
        prevTime.setHours(parseInt(ph), parseInt(pm), 0);

        let diffPrev = now - prevTime;
        let diffNext = next.t - now;

        let minutesSincePrev = diffPrev / 60000;

        if (minutesSincePrev >= 0 && minutesSincePrev < 26) {
            let hh = Math.floor(diffPrev / 3600000);
            let mm = Math.floor((diffPrev % 3600000) / 60000);
            let ss = Math.floor((diffPrev % 60000) / 1000);

            document.getElementById('next-p-name').innerText = namesAr[previous];
            document.getElementById('timer').innerText =
                `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

            document.getElementById('countdown').childNodes[0].textContent = "مضى على أذان ";

            document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${previous}`).classList.add('active');

            return;
        }

        let hh = Math.floor(diffNext / 3600000);
        let mm = Math.floor((diffNext % 3600000) / 60000);
        let ss = Math.floor((diffNext % 60000) / 1000);

        document.getElementById('next-p-name').innerText = namesAr[next.n];
        document.getElementById('timer').innerText =
            `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

        document.getElementById('countdown').childNodes[0].textContent = "باقي على أذان ";

        document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${next.n}`).classList.add('active');

    }, 1000);
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    ['ح','ن','ث','ر','خ','ج','س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);

    let m = viewDate.getMonth(), y = viewDate.getFullYear();

    // مهيئ اسم الشهر (هجري أو ميلادي) مع تحديد نوع التقويم صراحةً
    let monthFormatter = isHijri
        ? new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { month: 'long', year: 'numeric' })
        : new Intl.DateTimeFormat('ar-SA-u-ca-gregory', { month: 'long', year: 'numeric' });

    document.getElementById('monthDisplay').innerText = monthFormatter.format(viewDate);

    let firstDay = new Date(y, m, 1).getDay();
    let lastDay = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    // مهيئ رقم اليوم الهجري فقط
    let hijriDayFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { day: 'numeric' });

    for (let d = 1; d <= lastDay; d++) {
        let cur = new Date(y, m, d);
        let isT = new Date().toDateString() === cur.toDateString();

        let displayNum = isHijri
            ? hijriDayFormatter.format(cur)
            : d;

        grid.innerHTML += `<div class="day-cell ${isT ? 'today' : ''}">
            <span class="day-num">${displayNum}</span>
        </div>`;
    }
}

function toggleCalendarMode() {
    isHijri = !isHijri;
    document.getElementById('modeBtn').innerText =
        isHijri ? "التبديل للميلادي" : "التبديل للهجري";
    renderCalendar();
}

function changeMonth(s) {
    viewDate.setMonth(viewDate.getMonth() + s);
    renderCalendar();
}

function syncLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async p => {

            let lat = p.coords.latitude;
            let lon = p.coords.longitude;

            let cityName = "غير معروف";
            try {
                let res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ar`);
                let data = await res.json();
                cityName = data.city || data.locality || data.principalSubdivision || "غير معروف";
            } catch(e) {
                console.warn("City lookup failed", e);
            }

            document.getElementById('current-location-display').innerText = `المدينة الحالية: ${cityName}`;

            let select = document.getElementById('citySelect');
            let found = false;

            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].text.includes(cityName)) {
                    select.selectedIndex = i;
                    found = true;
                    break;
                }
            }

            if (found) {
                // حفظ المدينة المختارة لاستخدامها مستقبلاً
                localStorage.setItem('savedCityValue', select.value);
                localStorage.setItem('savedCityLabel', select.options[select.selectedIndex].text);
            }

            fetchPrayers(found ? select.value : "Makkah", lat, lon);

        }, err => {
            console.warn(err);
            fetchPrayers('Makkah');
        });
    }
}

// استرجاع المدينة المحفوظة إن وجدت
(function initCity() {
    const savedValue = localStorage.getItem('savedCityValue');
    const savedLabel = localStorage.getItem('savedCityLabel');

    if (savedValue && savedLabel) {
        const select = document.getElementById('citySelect');
        let matched = false;
        for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].value === savedValue) {
                select.selectedIndex = i;
                matched = true;
                break;
            }
        }
        if (matched) {
            document.getElementById('current-location-display').innerText = `المدينة الحالية: ${savedLabel}`;
            fetchPrayers(savedValue);
        } else {
            fetchPrayers('Makkah');
        }
    } else {
        fetchPrayers('Makkah');
    }
})();

renderCalendar();

</script>

</body>
</html>
