<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: "Tahoma", sans-serif;
        background: #1e1e1e;
        color: #fff;
        margin: 0;
        padding: 0;
        font-size: 20px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #2c2c2c;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .topbar {
        background: #157347;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 26px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #44ff88;
        font-size: 28px;
        margin-bottom: 15px;
        line-height: 1.6;
    }

    #header button {
        padding: 14px 26px;
        margin: 6px;
        background: #198754;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 20px;
        transition: 0.2s;
    }

    #header button:hover {
        background: #157347;
    }

    .switch-btn {
        background: #0d6efd;
        border-radius: 50%;
        width: 55px;
        height: 55px;
        font-size: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #333;
        border-radius: 12px;
        overflow: hidden;
        font-size: 20px;
    }

    th {
        background: #157347;
        color: white;
        padding: 16px;
        font-size: 20px;
        border: 1px solid #444;
    }

    td {
        padding: 18px;
        text-align: center;
        border: 1px solid #555;
        height: 110px;
        vertical-align: top;
        background: #2c2c2c;
        font-size: 20px;
        color: white;
    }

    .day {
        font-size: 26px;
        font-weight: bold;
        color: #fff;
    }

    .hijri {
        font-size: 18px;
        color: #ccc;
        margin-top: 8px;
    }

    .today {
        background: #295f2d !important;
        border: 2px solid #44ff88 !important;
        box-shadow: 0 0 8px rgba(0,255,100,0.4);
    }

    .event-national {
        background: #003300 !important;
        border: 2px solid #00cc44 !important;
    }

    .event-religious {
        background: #4b2e19 !important;
        border: 2px solid #d2a679 !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 5px 10px;
        background: #000;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="topbar">
    التقويم
</div>

<div class="container">

    <div id="header">

        <button class="switch-btn" onclick="toggleView()">🌐</button>

        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>

        <button onclick="window.location.href='https://ksashamel.github.io/shamel/'">
            المزيد
        </button>

        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

</div>

<script>
let viewMode = "hijri";  // ⭐ العرض الافتراضي = هجري

let currentYear, currentMonth;
let hijriYear, hijriMonth;

const events = [
    { name: "اليوم الوطني السعودي", date: "23-09", type: "national" },
    { name: "يوم التأسيس", date: "22-02", type: "national" },
    { name: "يوم العلم السعودي", date: "11-03", type: "national" },

    { name: "يوم عاشوراء", hijri: "10-01", type: "religious" },
    { name: "بداية رمضان", hijri: "01-09", type: "religious" },
    { name: "عيد الفطر", hijri: "01-10", type: "religious" },
    { name: "وقفة عرفة", hijri: "09-12", type: "religious" },
    { name: "عيد الأضحى", hijri: "10-12", type: "religious" }
];

function formatArabicNumber(num) {
    return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

async function getHijri(day, month, year) {
    const r = await fetch(`https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`);
    return (await r.json()).data.hijri;
}

function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

function prevMonth() {
    if (viewMode === "gregorian") {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        generateCalendar();
    } else {
        hijriMonth--;
        if (hijriMonth < 1) { hijriMonth = 12; hijriYear--; }
        generateHijriMonth();
    }
}

function nextMonth() {
    if (viewMode === "gregorian") {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        generateCalendar();
    } else {
        hijriMonth++;
        if (hijriMonth > 12) { hijriMonth = 1; hijriYear++; }
        generateHijriMonth();
    }
}

function toggleView() {
    viewMode = viewMode === "gregorian" ? "hijri" : "gregorian";
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

async function convertToHijriAndShow() {
    const t = new Date();
    const h = await getHijri(t.getDate(), t.getMonth()+1, t.getFullYear());
    hijriYear = h.year;
    hijriMonth = h.month.number;
    generateHijriMonth();
}

async function generateCalendar() {
    const today = new Date();

    // ⭐ أسماء الأيام بالإنجليزية
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>Sunday</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
            <th>Saturday</th>
        </tr>
    `;

    const dayName = today.toLocaleDateString("en-US", { weekday: "long" });
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    document.getElementById("title").innerHTML = `
        ${dayName}<br>
        ${today.getDate()} ${monthNames[today.getMonth()]} (${today.getMonth()+1}) ${today.getFullYear()}
    `;

    const year = currentYear;
    const month = currentMonth;

    const first = new Date(year, month, 1).getDay();
    const days = new Date(year, month+1, 0).getDate();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";
    let row = document.createElement("tr");

    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    for (let d=1; d<=days; d++) {
        const cell = document.createElement("td");
        const h = await getHijri(d, month+1, year);

        cell.innerHTML = `<div class="day">${d}</div><div class="hijri">${h.day}-${h.month.number} هـ</div>`;

        const gKey = `${String(d).padStart(2,"0")}-${String(month+1).padStart(2,"0")}`;
        const hKey = `${String(h.day).padStart(2,"0")}-${String(h.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.date===gKey || e.hijri===hKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear())
            cell.classList.add("today");

        row.appendChild(cell);
        if ((first+d)%7===0) { tbody.appendChild(row); row=document.createElement("tr"); }
    }

    tbody.appendChild(row);
}

async function generateHijriMonth() {
    // ⭐ أسماء الأيام بالعربية
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th>
            <th>الاثنين</th>
            <th>الثلاثاء</th>
            <th>الأربعاء</th>
            <th>الخميس</th>
            <th>الجمعة</th>
            <th>السبت</th>
        </tr>
    `;

    const today = new Date();
    const todayHijri = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());

    const dayName = today.toLocaleDateString("ar-SA", { weekday: "long" });

    document.getElementById("title").innerHTML = `
        ${dayName}<br>
        ${formatArabicNumber(todayHijri.day)} ${todayHijri.monthName} (${formatArabicNumber(todayHijri.month.number)}) ${formatArabicNumber(todayHijri.year)} هـ
    `;

    const r = await fetch(`https://api.aladhan.com/v1/hToG?date=1-${hijriMonth}-${hijriYear}`);
    const d = await r.json();
    const g = d.data.gregorian;

    const first = new Date(g.year, g.month.number-1, g.day).getDay();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    for (let day=1; day<=30; day++) {
        const r2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${day}-${hijriMonth}-${hijriYear}`);
        const d2 = await r2.json();
        const g2 = d2.data.gregorian;

        const cell = document.createElement("td");
        cell.innerHTML = `<div class="day">${formatArabicNumber(day)} هـ</div><div class="hijri">${g2.day}-${g2.month.number}-${g2.year} م</div>`;

        const hKey = `${String(day).padStart(2,"0")}-${String(hijriMonth).padStart(2,"0")}`;
        const gKey = `${String(g2.day).padStart(2,"0")}-${String(g2.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.hijri===hKey || e.date===gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (day === todayHijri.day && hijriMonth === todayHijri.month.number && hijriYear === todayHijri.year)
            cell.classList.add("today");

        row.appendChild(cell);
        if ((first+day)%7===0) { tbody.appendChild(row); row=document.createElement("tr"); }
    }

    tbody.appendChild(row);
}

window.onload = ()=>convertToHijriAndShow();  // ⭐ يبدأ بالهجري
</script>

</body>
</html>
