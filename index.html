<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم أم القرى الرسمي</title>
    <style>
        :root { --saudi-green: #006C35; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; }
        
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); display: block !important; }
        
        .prayer-header { background: #111; color: #fff; padding: 20px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 10px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 11px; color: #bbb; margin-bottom: 5px; }
        .p-t { display: block; font-size: 13px; font-weight: bold; color: var(--gold); }
        
        .info-area { padding: 20px; text-align: center; }
        .date-display { font-size: 20px; font-weight: bold; color: var(--saudi-green); margin-bottom: 10px; }
        body.dark .date-display { color: var(--gold); }
        
        .btn-gps { 
            display: block !important; width: 100%; padding: 15px; 
            background: var(--saudi-green); color: white; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; 
            font-size: 14px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,108,53,0.3);
        }
        #geoStatus { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <div style="font-size: 14px; color: #bbb;" id="status">مواقيت أم القرى الرسمية</div>
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="isha">--:--</span></div>
        </div>
    </div>

    <div class="info-area">
        <div class="date-display" id="hijriDate">جاري التحميل...</div>
        <div id="geoStatus">📍 مكة المكرمة</div>
        <button class="btn-gps" onclick="getLocation()">📍 تحديث حسب موقعي الحالي</button>
    </div>
</div>

<script>
    // تحديث التاريخ فوراً باستخدام نظام أم القرى المدمج
    function updateDate() {
        try {
            const locale = 'ar-SA-u-ca-islamic-umalqura';
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const formatter = new Intl.DateTimeFormat(locale, options);
            document.getElementById('hijriDate').innerText = formatter.format(new Date()) + " هـ";
        } catch (e) {
            document.getElementById('hijriDate').innerText = "خطأ في تحميل التاريخ";
        }
    }

    // جلب المواقيت من سيرفر Aladhan (طريقة أم القرى رقم 4)
    async function fetchPrayers(lat = 21.4225, lon = 39.8262) {
        const statusTxt = document.getElementById('status');
        statusTxt.innerText = "جاري التحديث...";
        
        try {
            const timestamp = Math.floor(Date.now() / 1000);
            const response = await fetch(`https://api.aladhan.com{timestamp}?latitude=${lat}&longitude=${lon}&method=4`);
            const data = await response.json();
            
            if(data.code === 200) {
                const t = data.data.timings;
                document.getElementById('fajr').innerText = t.Fajr;
                document.getElementById('dhuhr').innerText = t.Dhuhr;
                document.getElementById('asr').innerText = t.Asr;
                document.getElementById('maghrib').innerText = t.Maghrib;
                document.getElementById('isha').innerText = t.Isha;
                statusTxt.innerText = "مواقيت أم القرى الرسمية";
            }
        } catch (error) {
            statusTxt.innerText = "فشل الاتصال - تأكد من الإنترنت";
        }
    }

    // طلب الموقع الجغرافي
    function getLocation() {
        if (navigator.geolocation) {
            document.getElementById('geoStatus').innerText = "⏳ جاري تحديد موقعك...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    fetchPrayers(pos.coords.latitude, pos.coords.longitude);
                    document.getElementById('geoStatus').innerText = "📍 تم التحديث لموقعك الحالي";
                },
                (err) => {
                    alert("يرجى السماح بالوصول للموقع (GPS) ليتم التحديث.");
                    document.getElementById('geoStatus').innerText = "📍 مكة المكرمة (الافتراضي)";
                }
            );
        } else {
            alert("متصفحك لا يدعم خاصية الموقع.");
        }
    }

    // التشغيل عند تحميل الصفحة
    window.onload = () => {
        updateDate();
        fetchPrayers(); 
    };
</script>

</body>
</html>
