<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: "Tahoma", sans-serif;
        background: #1e1e1e;
        color: #fff;
        margin: 0;
        padding: 0;
        font-size: 18px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #2c2c2c;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .topbar {
        background: #157347;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 26px;
        font-weight: bold;
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #44ff88;
        font-size: 24px;
        margin-bottom: 15px;
    }

    #header button {
        padding: 10px 20px;
        margin: 4px;
        background: #198754;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
    }

    .switch-btn {
        background: #0d6efd;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        font-size: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #333;
        border-radius: 12px;
        overflow: hidden;
        font-size: 18px;
    }

    th {
        background: #157347;
        color: white;
        padding: 10px;
        border: 1px solid #444;
    }

    td {
        padding: 10px;
        text-align: center;
        border: 1px solid #555;
        height: 90px;
        vertical-align: top;
        background: #2c2c2c;
    }

    .day {
        font-size: 22px;
        font-weight: bold;
    }

    .hijri {
        font-size: 14px;
        color: #ccc;
        margin-top: 6px;
    }

    .today {
        background: #295f2d !important;
        border: 2px solid #44ff88 !important;
    }

    .event-national {
        background: #003300 !important;
        border: 2px solid #00cc44 !important;
    }

    .event-religious {
        background: #4b2e19 !important;
        border: 2px solid #d2a679 !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 6px;
        padding: 3px 6px;
        background: #000;
        color: white;
        font-size: 12px;
        border-radius: 6px;
        font-weight: bold;
    }

    #date-diff-box select {
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        margin: 5px;
        width: 120px;
    }
</style>
</head>

<body>

<div class="topbar">التقويم</div>

<div class="container">

    <div id="header">
        <button class="switch-btn" onclick="toggleView()">🌐</button>
        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>
        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

    <hr style="margin:30px 0; border-color:#444;">

    <div id="date-diff-box" style="text-align:center;">
        <h3 style="color:#44ff88;">حساب البعد الزمني</h3>

        <label><input type="radio" name="mode" value="greg" checked> ميلادي</label>
        &nbsp;&nbsp;
        <label><input type="radio" name="mode" value="hijri"> هجري</label>

        <!-- ميلادي -->
        <div id="gregorian-box" style="margin-top:15px;">
            <div>
                <label>التاريخ الأول:</label><br>
                <select id="g1d"></select>
                <select id="g1m"></select>
                <select id="g1y"></select>
            </div>

            <div>
                <label>التاريخ الثاني:</label><br>
                <select id="g2d"></select>
                <select id="g2m"></select>
                <select id="g2y"></select>
            </div>
        </div>

        <!-- هجري -->
        <div id="hijri-box" style="display:none; margin-top:15px;">
            <div>
                <label>التاريخ الأول:</label><br>
                <select id="h1d"></select>
                <select id="h1m"></select>
                <select id="h1y"></select>
            </div>

            <div>
                <label>التاريخ الثاني:</label><br>
                <select id="h2d"></select>
                <select id="h2m"></select>
                <select id="h2y"></select>
            </div>
        </div>

        <button onclick="calculateDateDiff()" 
                style="padding:10px 20px; margin-top:15px; background:#198754; color:white; border:none; border-radius:8px;">
            احسب
        </button>

        <div id="diff-result" style="margin-top:15px; font-size:18px;"></div>
    </div>

</div>

<script>
/* ---------------------- المتغيرات العامة ---------------------- */

let viewMode = "hijri";
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let hijriYear, hijriMonth;

const events = [
    { name: "اليوم الوطني السعودي", date: "23-09", type: "national" },
    { name: "يوم التأسيس", date: "22-02", type: "national" },
    { name: "يوم العلم السعودي", date: "11-03", type: "national" },

    { name: "يوم عاشوراء", hijri: "10-01", type: "religious" },
    { name: "بداية رمضان", hijri: "01-09", type: "religious" },
    { name: "عيد الفطر", hijri: "01-10", type: "religious" },
    { name: "وقفة عرفة", hijri: "09-12", type: "religious" },
    { name: "عيد الأضحى", hijri: "10-12", type: "religious" }
];

/* ---------------------- دوال مساعدة ---------------------- */

function formatArabicNumber(num) {
    return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

async function getHijri(day, month, year) {
    const r = await fetch(`https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`);
    return (await r.json()).data.hijri;
}

/* ---------------------- التحكم في التقويم ---------------------- */

function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

function prevMonth() {
    if (viewMode === "gregorian") {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        generateCalendar();
    } else {
        hijriMonth--;
        if (hijriMonth < 1) { hijriMonth = 12; hijriYear--; }
        generateHijriMonth();
    }
}

function nextMonth() {
    if (viewMode === "gregorian") {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        generateCalendar();
    } else {
        hijriMonth++;
        if (hijriMonth > 12) { hijriMonth = 1; hijriYear++; }
        generateHijriMonth();
    }
}

function toggleView() {
    viewMode = (viewMode === "gregorian") ? "hijri" : "gregorian";
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

/* ---------------------- التقويم الميلادي ---------------------- */

async function generateCalendar() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>Sunday</th><th>Monday</th><th>Tuesday</th>
            <th>Wednesday</th><th>Thursday</th><th>Friday</th><th>Saturday</th>
        </tr>
    `;

    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    document.getElementById("title").innerHTML =
        `${monthNames[currentMonth]} (${currentMonth+1}) ${currentYear}`;

    const first = new Date(currentYear, currentMonth, 1).getDay();
    const days = new Date(currentYear, currentMonth+1, 0).getDate();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const today = new Date();

    for (let d=1; d<=days; d++) {
        const cell = document.createElement("td");
        const h = await getHijri(d, currentMonth+1, currentYear);

        cell.innerHTML = `<div class="day">${d}</div><div class="hijri">${h.day}-${h.month.number} هـ</div>`;

        const gKey = `${String(d).padStart(2,"0")}-${String(currentMonth+1).padStart(2,"0")}`;
        const hKey = `${String(h.day).padStart(2,"0")}-${String(h.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.date === gKey || e.hijri === hKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + d) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* ---------------------- التقويم الهجري ---------------------- */

async function convertToHijriAndShow() {
    const t = new Date();
    const h = await getHijri(t.getDate(), t.getMonth()+1, t.getFullYear());
    hijriYear = parseInt(h.year);
    hijriMonth = parseInt(h.month.number);
    generateHijriMonth();
}

async function generateHijriMonth() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
        </tr>
    `;

    const r = await fetch(`https://api.aladhan.com/v1/hToG?date=1-${hijriMonth}-${hijriYear}`);
    const d = await r.json();
    const hInfo = d.data.hijri;
    const gInfo = d.data.gregorian;

    document.getElementById("title").innerHTML =
        `${hInfo.month.ar} (${formatArabicNumber(hInfo.month.number)}) ${formatArabicNumber(hijriYear)} هـ`;

    const first = new Date(gInfo.year, gInfo.month.number-1, gInfo.day).getDay();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const today = new Date();
    const todayHijri = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());

    for (let day=1; day<=30; day++) {
        const r2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${day}-${hijriMonth}-${hijriYear}`);
        const d2 = await r2.json();
        const g2 = d2.data.gregorian;

        const cell = document.createElement("td");
        cell.innerHTML = `
            <div class="day">${formatArabicNumber(day)}</div>
            <div class="hijri">${g2.day}-${g2.month.number}-${g2.year} م</div>
        `;

        const hKey = `${String(day).padStart(2,"0")}-${String(hijriMonth).padStart(2,"0")}`;
        const gKey = `${String(g2.day).padStart(2,"0")}-${String(g2.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.hijri === hKey || e.date === gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (day == todayHijri.day &&
            hijriMonth == todayHijri.month.number &&
            hijriYear == todayHijri.year) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + day) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* ---------------------- إعداد قوائم التاريخ الميلادي ---------------------- */

function setupGregorianSelectors() {
    const today = new Date();
    const currentYear = today.getFullYear();

    const years = [];
    for (let y = currentYear - 50; y <= currentYear + 50; y++) years.push(y);

    const months = [];
    for (let m = 1; m <= 12; m++) months.push(m);

    function fill(id, arr) {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        arr.forEach(v=>{
            const o = document.createElement("option");
            o.value = v;
            o.textContent = v;
            sel.appendChild(o);
        });
    }

    fill("g1m", months);
    fill("g2m", months);
    fill("g1y", years);
    fill("g2y", years);

    updateGregorianDays("g1");
    updateGregorianDays("g2");

    document.getElementById("g1m").onchange = ()=>updateGregorianDays("g1");
    document.getElementById("g1y").onchange = ()=>updateGregorianDays("g1");
    document.getElementById("g2m").onchange = ()=>updateGregorianDays("g2");
    document.getElementById("g2y").onchange = ()=>updateGregorianDays("g2");
}

function updateGregorianDays(prefix) {
    const year = parseInt(document.getElementById(prefix+"y").value);
    const month = parseInt(document.getElementById(prefix+"m").value);
    const daysInMonth = new Date(year, month, 0).getDate();

    const sel = document.getElementById(prefix+"d");
    sel.innerHTML = "";
    for (let d=1; d<=daysInMonth; d++) {
        const o = document.createElement("option");
        o.value = d;
        o.textContent = d;
        sel.appendChild(o);
    }
}

/* ---------------------- إعداد قوائم التاريخ الهجري ---------------------- */

async function setupHijriSelectors() {
    const today = new Date();
    const h = await
