<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; --neon-green: #39ff14; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .prayer-header { background: #111; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer-label { font-size: 13px; color: #bbb; display: block; margin-bottom: 2px; }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 20px; display: block; }
        
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.08); padding: 5px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }

        .controls-area { padding: 10px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 14px; cursor: pointer; }
        .btn-gps { width: 100%; padding: 10px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        
        .switch-mode { display: flex; justify-content: center; padding: 8px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: #333; }
        body.dark .toggle-btn { background: #444; color: #fff; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .month-label { font-weight: bold; font-size: 16px; color: var(--saudi-green); }
        body.dark .month-label { color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px 10px; min-height: 250px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; position: relative; cursor: pointer; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }

        .shamel-footer { padding: 20px 10px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { display: inline-block; width: 85%; padding: 14px 0; background: #2c2c2c; color: #fff !important; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px; border: 2px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); transition: 0.3s; }
    </style>
</head>
<body class="dark">
<div class="calendar-card">
    <div class="prayer-header">
        <span id="timer-label">باقي على الأذان القادم</span>
        <span id="timer">00:00:00</span>
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>
    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="updatePrayers(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Abha">أبها</option>
            <option value="Tabuk">تبوك</option>
            <option value="Buraidah">بريدة</option>
            <option value="Hail">حائل</option>
            <option value="Jizan">جيزان</option>
            <option value="Najran">نجران</option>
            <option value="Sakaka">سكاكا</option>
            <option value="Arar">عرعر</option>
        </select>
        <button class="btn-gps" onclick="syncLocation()">📍 تحديد أقرب مدينة تلقائياً</button>
        <div class="switch-mode">
            <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()">☀️ الوضع النهاري</button>
            <button class="toggle-btn" id="calBtn" onclick="toggleCalendar()">التبديل للميلادي</button>
        </div>
    </div>
    <div class="header">
        <button class="toggle-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="toggle-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
    <div class="shamel-footer"><a href="https://ksashamel.github.io" target="_blank" class="btn-shamel">شامل</a></div>
</div>

<script>
    let viewDate = new Date();
    let isHijri = true;
    let timerInterval;
    let currentCity = "Makkah";

    const saudiCities = {
        Makkah: { lat: 21.42, Fajr: "05:33", Dhuhr: "12:35", Asr: "15:52", Maghrib: "18:19", Isha: "19:49" },
        Riyadh: { lat: 24.71, Fajr: "05:07", Dhuhr: "12:08", Asr: "15:24", Maghrib: "17:49", Isha: "19:19" },
        Medina: { lat: 24.46, Fajr: "05:35", Dhuhr: "12:36", Asr: "15:51", Maghrib: "18:17", Isha: "19:47" },
        Jeddah: { lat: 21.54, Fajr: "05:38", Dhuhr: "12:37", Asr: "15:55", Maghrib: "18:22", Isha: "19:52" },
        Dammam: { lat: 26.42, Fajr: "04:54", Dhuhr: "11:54", Asr: "15:08", Maghrib: "17:33", Isha: "19:03" },
        Abha: { lat: 18.21, Fajr: "05:21", Dhuhr: "12:25", Asr: "15:44", Maghrib: "18:12", Isha: "19:42" },
        Tabuk: { lat: 28.38, Fajr: "05:49", Dhuhr: "12:48", Asr: "16:01", Maghrib: "18:26", Isha: "19:56" },
        Buraidah: { lat: 26.32, Fajr: "05:18", Dhuhr: "12:18", Asr: "15:32", Maghrib: "17:58", Isha: "19:28" },
        Hail: { lat: 27.52, Fajr: "05:28", Dhuhr: "12:27", Asr: "15:41", Maghrib: "18:06", Isha: "19:36" },
        Jizan: { lat: 16.88, Fajr: "05:21", Dhuhr: "12:25", Asr: "15:45", Maghrib: "18:15", Isha: "19:45" },
        Najran: { lat: 17.49, Fajr: "05:14", Dhuhr: "12:17", Asr: "15:37", Maghrib: "18:06", Isha: "19:36" },
        Sakaka: { lat: 29.97, Fajr: "05:41", Dhuhr: "12:36", Asr: "15:56", Maghrib: "18:14", Isha: "19:44" },
        Arar: { lat: 30.97, Fajr: "05:35", Dhuhr: "12:30", Asr: "15:50", Maghrib: "18:05", Isha: "19:35" }
    };

    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.getElementById('themeBtn').innerText = document.body.classList.contains('dark') ? "☀️ الوضع النهاري" : "🌙 الوضع الليلي";
    }

    function toggleCalendar() {
        isHijri = !isHijri;
        document.getElementById('calBtn').innerText = isHijri ? "التبديل للميلادي" : "التبديل للهجري";
        renderCalendar();
    }

    function changeMonth(step) {
        if (isHijri) {
            viewDate.setDate(15);
            viewDate.setMonth(viewDate.getMonth() + step);
        } else {
            viewDate.setMonth(viewDate.getMonth() + step);
        }
        renderCalendar();
    }

    function getHijriParts(date) {
        const fmt = new Intl.DateTimeFormat('en-u-ca-islamic-uma-nu-latn', {day:'numeric', month:'numeric', year:'numeric'});
        const p = fmt.formatToParts(date);
        const res = {};
        p.forEach(x => res[x.type] = x.value);
        return { day: parseInt(res.day), month: parseInt(res.month), year: parseInt(res.year) };
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('monthDisplay');
        grid.innerHTML = "";
        ['ح', 'ن', 'ث', 'ر', 'خ', 'ج', 'س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);

        if (isHijri) {
            const hFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {month:'long', year:'numeric'});
            monthLabel.innerText = hFormatter.format(viewDate);

            let temp = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate());
            let currentMonth = getHijriParts(temp).month;
            
            // العثور على اليوم الأول في الشهر الهجري
            let runner = new Date(temp);
            while(getHijriParts(runner).day !== 1) {
                runner.setDate(runner.getDate() - 1);
            }
            
            for (let i = 0; i < runner.getDay(); i++) grid.innerHTML += `<div></div>`;

            let startMonth = getHijriParts(runner).month;
            while(getHijriParts(runner).month === startMonth) {
                let hDay = getHijriParts(runner).day;
                let isToday = new Date().toDateString() === runner.toDateString() ? "today" : "";
                grid.innerHTML += `<div class="day-cell ${isToday}">${hDay}</div>`;
                runner.setDate(runner.getDate() + 1);
            }
        } else {
            const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            monthLabel.innerText = `${months[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
            let firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            let totalDays = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            for (let i = 1; i <= totalDays; i++) {
                let d = new Date(viewDate.getFullYear(), viewDate.getMonth(), i);
                let isToday = new Date().toDateString() === d.toDateString() ? "today" : "";
                grid.innerHTML += `<div class="day-cell ${isToday}">${i}</div>`;
            }
        }
    }

    function format12h(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        return `${String(h % 12 || 12).padStart(2, '0')}:${m}`;
    }

    function updatePrayers(cityKey) {
        currentCity = cityKey;
        const d = saudiCities[cityKey];
        ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"].forEach(p => document.getElementById(p).innerText = format12h(d[p]));
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        const pNames = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        const pAr = ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"];

        timerInterval = setInterval(() => {
            const now = new Date();
            const data = saudiCities[currentCity];
            let nextP = null, nextN = "";

            for (let i = 0; i < pNames.length; i++) {
                const [h, m] = data[pNames[i]].split(':');
                const pDate = new Date(); pDate.setHours(h, m, 0);
                if (pDate > now) { nextP = pDate; nextN = pAr[i]; break; }
            }

            if (!nextP) {
                const [h, m] = data["Fajr"].split(':');
                nextP = new Date(); nextP.setDate(now.getDate() + 1); nextP.setHours(h, m, 0);
                nextN = "الفجر";
            }

            const diff = nextP - now;
            const hh = Math.floor(diff / 3600000), mm = Math.floor((diff % 3600000) / 60000), ss = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer-label').innerText = `باقي على صلاة ${nextN}`;
            document.getElementById('timer').innerText = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }, 1000);
    }

    function syncLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                let closest = "Makkah", minDist = Infinity;
                for (let c in saudiCities) {
                    let d = Math.abs(saudiCities[c].lat - pos.coords.latitude);
                    if (d < minDist) { minDist = d; closest = c; }
                }
                document.getElementById('citySelect').value = closest;
                updatePrayers(closest);
            });
        }
    }

    updatePrayers("Makkah");
    renderCalendar();
</script>
</body>
</html>
