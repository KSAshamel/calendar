<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: "Tahoma", sans-serif;
        background: #1e1e1e;
        color: #fff;
        margin: 0;
        padding: 0;
        font-size: 20px;
    }

    .container {
        max-width: 900px;
        margin: 40px auto;
        background: #2c2c2c;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .topbar {
        background: #157347;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 26px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #44ff88;
        font-size: 28px;
        margin-bottom: 15px;
        line-height: 1.6;
    }

    #header button {
        padding: 14px 26px;
        margin: 6px;
        background: #198754;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 20px;
        transition: 0.2s;
    }

    #header button:hover {
        background: #157347;
    }

    .switch-btn {
        background: #0d6efd;
        border-radius: 50%;
        width: 55px;
        height: 55px;
        font-size: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #333;
        border-radius: 12px;
        overflow: hidden;
        font-size: 20px;
    }

    th {
        background: #157347;
        color: white;
        padding: 16px;
        font-size: 20px;
        border: 1px solid #444;
    }

    td {
        padding: 18px;
        text-align: center;
        border: 1px solid #555;
        height: 110px;
        vertical-align: top;
        background: #2c2c2c;
        font-size: 20px;
        color: white;
    }

    .day {
        font-size: 26px;
        font-weight: bold;
        color: #fff;
    }

    .hijri {
        font-size: 18px;
        color: #ccc;
        margin-top: 8px;
    }

    .today {
        background: #295f2d !important;
        border: 2px solid #44ff88 !important;
        box-shadow: 0 0 8px rgba(0,255,100,0.4);
    }

    .event-national {
        background: #003300 !important;
        border: 2px solid #00cc44 !important;
    }

    .event-religious {
        background: #4b2e19 !important;
        border: 2px solid #d2a679 !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 5px 10px;
        background: #000;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        font-weight: bold;
    }

    #date-diff-box input {
        width: 250px;
        padding: 10px;
        font-size: 18px;
        border-radius: 6px;
        border: none;
        margin-top: 10px;
    }

    .hijri-input {
        width: 70px;
        padding: 10px;
        font-size: 18px;
        border-radius: 6px;
        border: none;
        margin: 5px;
        text-align: center;
    }
</style>
</head>

<body>

<div class="topbar">
    التقويم
</div>

<div class="container">

    <div id="header">

        <button class="switch-btn" onclick="toggleView()">🌐</button>

        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>

        <button onclick="window.location.href='https://ksashamel.github.io/shamel/'">
            المزيد
        </button>

        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

    <!-- حساب البعد الزمني -->
    <hr style="margin:40px 0; border-color:#444;">

    <div id="date-diff-box" style="text-align:center; margin-top:30px;">
        <h3 style="color:#44ff88;">حساب البعد الزمني</h3>

        <div style="margin:20px 0;">
            <label>اختر نوع الحساب:</label><br><br>

            <label><input type="radio" name="mode" value="greg" checked> ميلادي</label>
            &nbsp;&nbsp;&nbsp;
            <label><input type="radio" name="mode" value="hijri"> هجري</label>
        </div>

        <!-- ميلادي -->
        <div id="gregorian-box">
            <div style="margin:20px 0;">
                <label>التاريخ الأول:</label><br>
                <input type="date" id="g1">
            </div>

            <div style="margin:20px 0;">
                <label>التاريخ الثاني:</label><br>
                <input type="date" id="g2">
            </div>
        </div>

        <!-- هجري -->
        <div id="hijri-box" style="display:none;">
            <div style="margin:20px 0;">
                <label>التاريخ الأول (هجري):</label><br>
                <input class="hijri-input" id="h1d" placeholder="يوم">
                <input class="hijri-input" id="h1m" placeholder="شهر">
                <input class="hijri-input" id="h1y" placeholder="سنة">
            </div>

            <div style="margin:20px 0;">
                <label>التاريخ الثاني (هجري):</label><br>
                <input class="hijri-input" id="h2d" placeholder="يوم">
                <input class="hijri-input" id="h2m" placeholder="شهر">
                <input class="hijri-input" id="h2y" placeholder="سنة">
            </div>
        </div>

        <button onclick="calculateDateDiff()" 
                style="padding:12px 25px; font-size:20px; background:#198754; color:white; border:none; border-radius:8px; cursor:pointer;">
            احسب
        </button>

        <div id="diff-result" style="margin-top:25px; font-size:22px; color:#fff;"></div>
    </div>

</div>

<script>
/* نفس كود التقويم السابق بدون تغيير */

document.querySelectorAll("input[name='mode']").forEach(r=>{
    r.addEventListener("change", ()=>{
        document.getElementById("gregorian-box").style.display =
            r.value === "greg" ? "block" : "none";

        document.getElementById("hijri-box").style.display =
            r.value === "hijri" ? "block" : "none";
    });
});

/* ⭐ حساب البعد الزمني */
async function calculateDateDiff() {
    const mode = document.querySelector("input[name='mode']:checked").value;

    if (mode === "greg") {
        const d1 = document.getElementById("g1").value;
        const d2 = document.getElementById("g2").value;

        if (!d1 || !d2) {
            document.getElementById("diff-result").innerHTML = "الرجاء اختيار التاريخين.";
            return;
        }

        const date1 = new Date(d1);
        const date2 = new Date(d2);

        showDiff(Math.abs(date2 - date1));

    } else {
        const d1 = document.getElementById("h1d").value;
        const m1 = document.getElementById("h1m").value;
        const y1 = document.getElementById("h1y").value;

        const d2 = document.getElementById("h2d").value;
        const m2 = document.getElementById("h2m").value;
        const y2 = document.getElementById("h2y").value;

        if (!d1 || !m1 || !y1 || !d2 || !m2 || !y2) {
            document.getElementById("diff-result").innerHTML = "الرجاء إدخال التاريخين كاملين.";
            return;
        }

        const g1 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d1}-${m1}-${y1}`).then(r=>r.json());
        const g2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d2}-${m2}-${y2}`).then(r=>r.json());

        const date1 = new Date(g1.data.gregorian.date);
        const date2 = new Date(g2.data.gregorian.date);

        showDiff(Math.abs(date2 - date1));
    }
}

function showDiff(diffTime) {
    let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let years = Math.floor(diffDays / 365);
    let months = Math.floor((diffDays % 365) / 30);
    let days = diffDays - (years * 365) - (months * 30);

    document.getElementById("diff-result").innerHTML = `
        الفرق:<br>
        ${years} سنة — ${months} شهر — ${days} يوم<br>
        (إجمالي الأيام: ${diffDays})
    `;
}
</script>

</body>
</html>
