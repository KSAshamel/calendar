<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; --neon-green: #39ff14; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; margin: 0; transition: 0.3s; }
        
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .prayer-header { background: #222; color: #fff; padding: 12px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        #timer { color: var(--gold); font-weight: bold; font-family: monospace; font-size: 16px; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 8px; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 5px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }

        .controls-area { padding: 10px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-family: inherit; font-size: 14px; }
        .btn-gps { width: 100%; padding: 10px; background: var(--saudi-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        #current-location-display { text-align: center; font-size: 12px; font-weight: bold; color: var(--primary); margin-top: 5px; }

        .switch-mode { display: flex; justify-content: center; padding: 8px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: #444; }
        body.dark .toggle-btn { background: #444; color: #fff; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .month-label { font-weight: bold; }
        .nav-btn { cursor: pointer; border: none; background: #f0f0f0; padding: 6px 12px; border-radius: 6px; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px 10px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; position: relative; cursor: pointer; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }

        .day-cell[data-event]:hover::after {
            content: attr(data-event); position: absolute; bottom: 110%; background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; z-index: 100;
        }

        .shamel-footer { padding: 15px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { 
            display: inline-block; width: 85%; padding: 12px 0; background: #2c2c2c; color: #ffffff; 
            text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 16px;
            border: 2px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.3); transition: 0.3s;
        }
        .btn-shamel:hover { background: #1a1a1a; box-shadow: 0 0 20px rgba(57, 255, 20, 0.6); }

        .event-icon { font-size: 11px; margin-top: 2px; }
        .saudi-flag { width: 16px; height: 10px; background: var(--saudi-green); border: 1px solid white; margin-top: 2px; }
    </style>
</head>
<body class="dark">

<div class="calendar-card">
    <div class="prayer-header">
        <div id="countdown">باقي على أذان <span id="next-p-name">--</span> <span id="timer">00:00:00</span></div>
        <div class="prayer-grid">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>

    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="updateByManualSelection(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Medina">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
            <option value="Tabuk">تبوك</option>
            <option value="Abha">أبها</option>
            <option value="Buraidah">بريدة</option>
            <option value="Hail">حائل</option>
            <option value="Jizan">جيزان</option>
            <option value="Najran">نجران</option>
            <option value="Sakaka">سكاكا</option>
            <option value="Arar">عرعر</option>
        </select>
        <button class="btn-gps" onclick="syncLocation()">📍 تحديد أقرب مدينة تلقائياً</button>
        <div id="current-location-display">المدينة الحالية: مكة المكرمة</div>
        <div class="switch-mode">
            <button class="toggle-btn" onclick="toggleMode()">التبديل للميلادي</button>
            <button class="toggle-btn" onclick="toggleDark()">🌙 الوضع الليلي</button>
        </div>
    </div>

    <div class="header">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="month-label" id="monthDisplay">--</div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div class="shamel-footer">
        <a href="https://ksashamel.github.io" target="_blank" class="btn-shamel">شامل</a>
    </div>
</div>

<script>
    let viewDate = new Date(), isHijri = true;

    const saudiCitiesData = {
        Makkah: { name: "مكة المكرمة", lat: 21.42, lon: 39.82, Fajr: "05:35 ص", Dhuhr: "12:35 م", Asr: "03:52 م", Maghrib: "06:19 م", Isha: "07:49 م" },
        Riyadh: { name: "الرياض", lat: 24.71, lon: 46.67, Fajr: "05:07 ص", Dhuhr: "12:08 م", Asr: "03:24 م", Maghrib: "05:49 م", Isha: "07:19 م" },
        Medina: { name: "المدينة المنورة", lat: 24.46, lon: 39.61, Fajr: "05:36 ص", Dhuhr: "12:36 م", Asr: "03:51 م", Maghrib: "06:17 م", Isha: "07:47 م" },
        Jeddah: { name: "جدة", lat: 21.54, lon: 39.17, Fajr: "05:38 ص", Dhuhr: "12:37 م", Asr: "03:55 م", Maghrib: "06:22 م", Isha: "07:52 م" },
        Dammam: { name: "الدمام", lat: 26.42, lon: 50.08, Fajr: "04:54 ص", Dhuhr: "11:54 ص", Asr: "03:08 م", Maghrib: "05:33 م", Isha: "07:03 م" },
        Tabuk: { name: "تبوك", lat: 28.38, lon: 36.56, Fajr: "05:51 ص", Dhuhr: "12:48 م", Asr: "04:00 م", Maghrib: "06:25 م", Isha: "07:55 م" },
        Abha: { name: "أبها", lat: 18.21, lon: 42.50, Fajr: "05:22 ص", Dhuhr: "12:25 م", Asr: "03:44 م", Maghrib: "06:12 م", Isha: "07:42 م" },
        Buraidah: { name: "بريدة", lat: 26.32, lon: 43.97, Fajr: "05:18 ص", Dhuhr: "12:18 م", Asr: "03:32 م", Maghrib: "05:58 م", Isha: "07:28 م" },
        Hail: { name: "حائل", lat: 27.52, lon: 41.68, Fajr: "05:28 ص", Dhuhr: "12:27 م", Asr: "03:41 م", Maghrib: "06:06 م", Isha: "07:36 م" },
        Jizan: { name: "جيزان", lat: 16.88, lon: 42.55, Fajr: "05:21 ص", Dhuhr: "12:25 م", Asr: "03:45 م", Maghrib: "06:15 م", Isha: "07:45 م" },
        Najran: { name: "نجران", lat: 17.49, lon: 44.12, Fajr: "05:14 ص", Dhuhr: "12:17 م", Asr: "03:37 م", Maghrib: "06:06 م", Isha: "07:36 م" },
        Sakaka: { name: "سكاكا", lat: 29.97, lon: 40.20, Fajr: "05:41 ص", Dhuhr: "12:36 م", Asr: "03:56 م", Maghrib: "06:14 م", Isha: "07:44 م" },
        Arar: { name: "عرعر", lat: 30.97, lon: 41.03, Fajr: "05:35 ص", Dhuhr: "12:30 م", Asr: "03:50 م", Maghrib: "06:05 م", Isha: "07:35 م" }
    };

    function updateByManualSelection(cityId) {
        let city = saudiCitiesData[cityId];
        document.getElementById('current-location-display').innerText = `المدينة الحالية: ${city.name}`;
        ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(p => document.getElementById(p).innerText = city[p]);
    }

    function syncLocation() {
        if (!navigator.geolocation) return alert("المتصفح لا يدعم تحديد الموقع");
        navigator.geolocation.getCurrentPosition(pos => {
            let closest = "Makkah", minDay = Infinity;
            for (let id in saudiCitiesData) {
                let d = Math.sqrt(Math.pow(pos.coords.latitude - saudiCitiesData[id].lat, 2) + Math.pow(pos.coords.longitude - saudiCitiesData[id].lon, 2));
                if (d < minDay) { minDay = d; closest = id; }
            }
            document.getElementById('citySelect').value = closest;
            updateByManualSelection(closest);
        });
    }

    function toggleDark() { document.body.classList.toggle('dark'); }
    function toggleMode() { isHijri = !isHijri; renderCalendar(); }
    function changeMonth(step) { viewDate.setMonth(viewDate.getMonth() + step); renderCalendar(); }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const cal = isHijri ? 'islamic-umalqura' : 'gregory';
        const label = new Intl.DateTimeFormat('ar-SA-u-ca-'+cal, {month:'long', year:'numeric'}).format(viewDate);
        document.getElementById('monthDisplay').innerText = label;
        ['ح','ن','ث','ر','خ','ج','س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
        for(let i=1; i<=30; i++) {
            let ev = (!isHijri && i==22 && viewDate.getMonth()==1) ? "يوم التأسيس 🇸🇦" : "";
            let icon = ev ? `<div class="saudi-flag"></div>` : "";
            const isToday = (i === new Date().getDate() && viewDate.getMonth() === new Date().getMonth()) ? 'today' : '';
            grid.innerHTML += `<div class="day-cell ${isToday}" data-event="${ev}">${i}${icon}</div>`;
        }
    }

    updateByManualSelection('Makkah');
    renderCalendar();
</script>
</body>
</html>
