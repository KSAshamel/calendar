<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقويم شامل - تحديث تلقائي</title>
    <style>
        :root { --saudi-green: #006C35; --primary: #0078d4; --gold: #ffd700; --bg: #f4f7f6; --text: #222; --card-bg: #fff; --border: #ddd; --neon-green: #39ff14; }
        body.dark { --bg: #1a1a1a; --text: #eaeaea; --card-bg: #2a2a2a; --border: #444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; transition: 0.3s; }
        .calendar-card { background: var(--card-bg); width: 100%; max-width: 420px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .prayer-header { background: #111; color: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--saudi-green); }
        .prayer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .prayer-item { background: rgba(255,255,255,0.08); padding: 8px 2px; border-radius: 6px; text-align: center; }
        .p-n { display: block; font-size: 10px; color: #bbb; }
        .p-t { display: block; font-size: 11px; font-weight: bold; color: var(--gold); }
        .controls-area { padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .select-city { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 14px; }
        .switch-mode { display: flex; justify-content: center; padding: 10px; gap: 10px; }
        .toggle-btn { cursor: pointer; padding: 6px 15px; background: #eee; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: #333; }
        body.dark .toggle-btn { background: #444; color: #fff; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; }
        .day-name { text-align: center; font-size: 11px; font-weight: bold; color: #999; padding-bottom: 10px; }
        .day-cell { height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 15px; position: relative; }
        .day-cell.today { background: var(--primary); color: white; font-weight: bold; }
        .shamel-footer { padding: 20px 15px; text-align: center; border-top: 1px solid var(--border); }
        .btn-shamel { display: inline-block; width: 90%; padding: 15px 0; background: #2c2c2c; color: #ffffff; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; border: 2px solid var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); transition: 0.3s; }
    </style>
</head>
<body class="dark">
<div class="calendar-card">
    <div class="prayer-header">
        <div id="date-info">تقويم أم القرى - تحديث يومي</div>
        <div class="prayer-grid" id="prayers">
            <div class="prayer-item"><span class="p-n">الفجر</span><span class="p-t" id="Fajr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">الظهر</span><span class="p-t" id="Dhuhr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العصر</span><span class="p-t" id="Asr">--:--</span></div>
            <div class="prayer-item"><span class="p-n">المغرب</span><span class="p-t" id="Maghrib">--:--</span></div>
            <div class="prayer-item"><span class="p-n">العشاء</span><span class="p-t" id="Isha">--:--</span></div>
        </div>
    </div>
    <div class="controls-area">
        <select class="select-city" id="citySelect" onchange="loadPrayers(this.value)">
            <option value="Makkah">مكة المكرمة</option>
            <option value="Riyadh">الرياض</option>
            <option value="Madinah">المدينة المنورة</option>
            <option value="Jeddah">جدة</option>
            <option value="Dammam">الدمام</option>
        </select>
        <div class="switch-mode">
            <button class="toggle-btn" id="themeBtn" onclick="toggleDark()">☀️ الوضع النهاري</button>
            <button class="toggle-btn" id="calBtn" onclick="toggleMode()">التبديل للميلادي</button>
        </div>
    </div>
    <div class="header">
        <button class="toggle-btn" onclick="changeMonth(-1)">❮</button>
        <div id="monthDisplay" style="font-weight: bold;">--</div>
        <button class="toggle-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
    <div class="shamel-footer">
        <a href="https://ksashamel.github.io" target="_blank" class="btn-shamel">شامل</a>
    </div>
</div>

<script>
    let viewDate = new Date(), isHijri = true;

    // دالة جلب المواقيت من API خارجي موثوق بمعيار أم القرى (Method 4)
    async function loadPrayers(city) {
        try {
            const response = await fetch(`https://api.aladhan.com{city}&country=SA&method=4`);
            const data = await response.json();
            const t = data.data.timings;
            
            const convert = (time) => {
                let [h, m] = time.split(':');
                let ampm = h >= 12 ? 'م' : 'ص';
                h = h % 12 || 12;
                return `${h}:${m} ${ampm}`;
            };

            document.getElementById('Fajr').innerText = convert(t.Fajr);
            document.getElementById('Dhuhr').innerText = convert(t.Dhuhr);
            document.getElementById('Asr').innerText = convert(t.Asr);
            document.getElementById('Maghrib').innerText = convert(t.Maghrib);
            document.getElementById('Isha').innerText = convert(t.Isha);
        } catch (error) {
            console.error("خطأ في جلب المواقيت");
        }
    }

    function toggleDark() {
        document.body.classList.toggle('dark');
        document.getElementById('themeBtn').innerText = document.body.classList.contains('dark') ? "☀️ الوضع النهاري" : "🌙 الوضع الليلي";
    }

    function toggleMode() {
        isHijri = !isHijri;
        document.getElementById('calBtn').innerText = isHijri ? "التبديل للميلادي" : "التبديل للهجري";
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const cal = isHijri ? 'ar-SA-u-ca-islamic-umalqura' : 'ar-SA';
        document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat(cal, {month:'long', year:'numeric'}).format(viewDate);
        
        ['ح','ن','ث','ر','خ','ج','س'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
        
        const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        
        const now = new Date();
        for(let i=1; i<=daysInMonth; i++) {
            const isToday = (i===now.getDate() && viewDate.getMonth()===now.getMonth() && viewDate.getFullYear()===now.getFullYear());
            grid.innerHTML += `<div class="day-cell ${isToday?'today':''}">${i}</div>`;
        }
    }

    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }

    renderCalendar();
    loadPrayers('Makkah');
</script>
</body>
</html>
