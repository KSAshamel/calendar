<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقويم</title>

<style>
    body {
        font-family: Tahoma, Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
        margin: 0;
        padding: 0;
        font-size: 18px;
    }

    .container {
        max-width: 1000px;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .topbar {
        background: #4a6fa5;
        padding: 20px;
        text-align: center;
        color: white;
        font-size: 28px;
        font-weight: bold;
        border-bottom: 4px solid #3b5a85;
    }

    #header {
        text-align: center;
        margin-bottom: 25px;
    }

    #header h2 {
        color: #4a6fa5;
        font-size: 26px;
        margin-bottom: 15px;
    }

    #header button {
        padding: 10px 20px;
        margin: 4px;
        background: #4a6fa5;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
    }

    #header button:hover {
        background: #3b5a85;
    }

    .switch-btn {
        background: #ffb703;
        color: #222;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        font-size: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        font-size: 18px;
    }

    th {
        background: #4a6fa5;
        color: white;
        padding: 12px;
        border: 1px solid #ddd;
    }

    td {
        padding: 12px;
        text-align: center;
        border: 1px solid #eee;
        height: 100px;
        vertical-align: top;
        background: #fafafa;
    }

    .day {
        font-size: 22px;
        font-weight: bold;
        color: #222;
    }

    .hijri {
        font-size: 14px;
        color: #666;
        margin-top: 6px;
    }

    .today {
        background: #e3f2fd !important;
        border: 2px solid #4a6fa5 !important;
    }

    .event-national {
        background: #fff4e6 !important;
        border: 2px solid #ffb703 !important;
    }

    .event-religious {
        background: #e8f5e9 !important;
        border: 2px solid #66bb6a !important;
    }

    .event-badge {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 8px;
        background: #4a6fa5;
        color: white;
        font-size: 12px;
        border-radius: 6px;
        font-weight: bold;
    }

    #date-diff-box select {
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin: 5px;
        width: 120px;
    }

    #date-diff-box button {
        background: #4a6fa5;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
    }

    #date-diff-box button:hover {
        background: #3b5a85;
    }
</style>
</head>

<body>

<div class="topbar">التقويم</div>

<div class="container">

    <div id="header">
        <button class="switch-btn" onclick="toggleView()">🌐</button>
        <button onclick="prevMonth()">السابق</button>
        <button onclick="goToday()">اليوم</button>
        <button onclick="nextMonth()">التالي</button>
        <h2 id="title"></h2>
    </div>

    <table id="calendar">
        <thead id="days-header"></thead>
        <tbody></tbody>
    </table>

    <hr style="margin:30px 0; border-color:#ddd;">
<script>
/* ---------------------- المتغيرات العامة ---------------------- */

let viewMode = "hijri";
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let hijriYear, hijriMonth;

const events = [
    { name: "اليوم الوطني السعودي", date: "23-09", type: "national" },
    { name: "يوم التأسيس", date: "22-02", type: "national" },
    { name: "يوم العلم السعودي", date: "11-03", type: "national" },

    { name: "يوم عاشوراء", hijri: "10-01", type: "religious" },
    { name: "بداية رمضان", hijri: "01-09", type: "religious" },
    { name: "عيد الفطر", hijri: "01-10", type: "religious" },
    { name: "وقفة عرفة", hijri: "09-12", type: "religious" },
    { name: "عيد الأضحى", hijri: "10-12", type: "religious" }
];

/* ---------------------- دوال مساعدة ---------------------- */

function formatArabicNumber(num) {
    return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

async function getHijri(day, month, year) {
    const r = await fetch(`https://api.aladhan.com/v1/gToH?date=${day}-${month}-${year}`);
    return (await r.json()).data.hijri;
}

/* ---------------------- التحكم في التقويم ---------------------- */

function goToday() {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

function prevMonth() {
    if (viewMode === "gregorian") {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        generateCalendar();
    } else {
        hijriMonth--;
        if (hijriMonth < 1) { hijriMonth = 12; hijriYear--; }
        generateHijriMonth();
    }
}

function nextMonth() {
    if (viewMode === "gregorian") {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        generateCalendar();
    } else {
        hijriMonth++;
        if (hijriMonth > 12) { hijriMonth = 1; hijriYear++; }
        generateHijriMonth();
    }
}

function toggleView() {
    viewMode = (viewMode === "gregorian") ? "hijri" : "gregorian";
    viewMode === "gregorian" ? generateCalendar() : convertToHijriAndShow();
}

/* ---------------------- التقويم الميلادي ---------------------- */

async function generateCalendar() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
        </tr>
    `;

    const monthNames = [
        "يناير","فبراير","مارس","أبريل","مايو","يونيو",
        "يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"
    ];

    document.getElementById("title").innerHTML =
        `${monthNames[currentMonth]} ${currentYear}`;

    const first = new Date(currentYear, currentMonth, 1).getDay();
    const days = new Date(currentYear, currentMonth+1, 0).getDate();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const today = new Date();

    for (let d=1; d<=days; d++) {
        const cell = document.createElement("td");
        const h = await getHijri(d, currentMonth+1, currentYear);

        cell.innerHTML = `
            <div class="day">${d}</div>
            <div class="hijri">${h.day}-${h.month.number} هـ</div>
        `;

        const gKey = `${String(d).padStart(2,"0")}-${String(currentMonth+1).padStart(2,"0")}`;
        const hKey = `${String(h.day).padStart(2,"0")}-${String(h.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.date === gKey || e.hijri === hKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + d) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}

/* ---------------------- التقويم الهجري (30 يوم دائمًا) ---------------------- */

async function convertToHijriAndShow() {
    const t = new Date();
    const h = await getHijri(t.getDate(), t.getMonth()+1, t.getFullYear());
    hijriYear = parseInt(h.year);
    hijriMonth = parseInt(h.month.number);
    generateHijriMonth();
}

async function generateHijriMonth() {
    document.getElementById("days-header").innerHTML = `
        <tr>
            <th>الأحد</th><th>الاثنين</th><th>الثلاثاء</th>
            <th>الأربعاء</th><th>الخميس</th><th>الجمعة</th><th>السبت</th>
        </tr>
    `;

    const monthNames = [
        "محرم","صفر","ربيع الأول","ربيع الآخر","جمادى الأولى","جمادى الآخرة",
        "رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"
    ];

    document.getElementById("title").innerHTML =
        `${monthNames[hijriMonth-1]} ${hijriYear} هـ`;

    const r = await fetch(`https://api.aladhan.com/v1/hToG?date=1-${hijriMonth}-${hijriYear}`);
    const d = await r.json();
    const gInfo = d.data.gregorian;

    const first = new Date(gInfo.year, gInfo.month.number-1, gInfo.day).getDay();

    const tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let row = document.createElement("tr");
    for (let i=0;i<first;i++) row.appendChild(document.createElement("td"));

    const today = new Date();
    const todayHijri = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());

    for (let day=1; day<=30; day++) {
        const r2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${day}-${hijriMonth}-${hijriYear}`);
        const d2 = await r2.json();
        const g2 = d2.data.gregorian;

        const cell = document.createElement("td");
        cell.innerHTML = `
            <div class="day">${formatArabicNumber(day)}</div>
            <div class="hijri">${g2.day}-${g2.month.number}-${g2.year} م</div>
        `;

        const hKey = `${String(day).padStart(2,"0")}-${String(hijriMonth).padStart(2,"0")}`;
        const gKey = `${String(g2.day).padStart(2,"0")}-${String(g2.month.number).padStart(2,"0")}`;

        events.forEach(e=>{
            if (e.hijri === hKey || e.date === gKey) {
                cell.classList.add(e.type === "national" ? "event-national" : "event-religious");
                cell.innerHTML += `<div class="event-badge">${e.name}</div>`;
            }
        });

        if (day == todayHijri.day &&
            hijriMonth == todayHijri.month.number &&
            hijriYear == todayHijri.year) {
            cell.classList.add("today");
        }

        row.appendChild(cell);
        if ((first + day) % 7 === 0) {
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
    }

    if (row.children.length > 0) tbody.appendChild(row);
}
/* ---------------------- إعداد قوائم التاريخ الميلادي ---------------------- */

function setupGregorianSelectors() {
    const today = new Date();
    const currentYear = today.getFullYear();

    const years = [];
    for (let y = currentYear - 50; y <= currentYear + 50; y++) years.push(y);

    const months = [];
    for (let m = 1; m <= 12; m++) months.push(m);

    function fill(id, arr) {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        arr.forEach(v=>{
            const o = document.createElement("option");
            o.value = v;
            o.textContent = v;
            sel.appendChild(o);
        });
    }

    fill("g1m", months);
    fill("g2m", months);
    fill("g1y", years);
    fill("g2y", years);

    updateGregorianDays("g1");
    updateGregorianDays("g2");

    document.getElementById("g1m").onchange = ()=>updateGregorianDays("g1");
    document.getElementById("g1y").onchange = ()=>updateGregorianDays("g1");
    document.getElementById("g2m").onchange = ()=>updateGregorianDays("g2");
    document.getElementById("g2y").onchange = ()=>updateGregorianDays("g2");
}

function updateGregorianDays(prefix) {
    const year = parseInt(document.getElementById(prefix+"y").value);
    const month = parseInt(document.getElementById(prefix+"m").value);
    const daysInMonth = new Date(year, month, 0).getDate();

    const sel = document.getElementById(prefix+"d");
    sel.innerHTML = "";
    for (let d=1; d<=daysInMonth; d++) {
        const o = document.createElement("option");
        o.value = d;
        o.textContent = d;
        sel.appendChild(o);
    }
}

/* ---------------------- إعداد قوائم التاريخ الهجري (30 يوم دائمًا) ---------------------- */

async function setupHijriSelectors() {
    const today = new Date();
    const h = await getHijri(today.getDate(), today.getMonth()+1, today.getFullYear());
    const currentHijriYear = parseInt(h.year);

    const years = [];
    for (let y = currentHijriYear - 50; y <= currentHijriYear + 50; y++) years.push(y);

    const months = [];
    for (let m = 1; m <= 12; m++) months.push(m);

    const days = [];
    for (let d = 1; d <= 30; d++) days.push(d);

    function fill(id, arr) {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        arr.forEach(v=>{
            const o = document.createElement("option");
            o.value = v;
            o.textContent = v;
            sel.appendChild(o);
        });
    }

    fill("h1d", days);
    fill("h2d", days);
    fill("h1m", months);
    fill("h2m", months);
    fill("h1y", years);
    fill("h2y", years);

    // تعيين القيم الافتراضية
    document.getElementById("h1d").value = parseInt(h.day);
    document.getElementById("h1m").value = parseInt(h.month.number);
    document.getElementById("h1y").value = parseInt(h.year);

    document.getElementById("h2d").value = parseInt(h.day);
    document.getElementById("h2m").value = parseInt(h.month.number);
    document.getElementById("h2y").value = parseInt(h.year);
}

/* ---------------------- حساب البعد الزمني ---------------------- */

async function calculateDateDiff() {
    const mode = document.querySelector("input[name='mode']:checked").value;

    if (mode === "greg") {
        const d1 = new Date(
            document.getElementById("g1y").value,
            document.getElementById("g1m").value - 1,
            document.getElementById("g1d").value
        );

        const d2 = new Date(
            document.getElementById("g2y").value,
            document.getElementById("g2m").value - 1,
            document.getElementById("g2d").value
        );

        showDiff(Math.abs(d2 - d1));
    }

    else {
        const d1 = document.getElementById("h1d").value;
        const m1 = document.getElementById("h1m").value;
        const y1 = document.getElementById("h1y").value;

        const d2 = document.getElementById("h2d").value;
        const m2 = document.getElementById("h2m").value;
        const y2 = document.getElementById("h2y").value;

        const g1 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d1}-${m1}-${y1}`).then(r=>r.json());
        const g2 = await fetch(`https://api.aladhan.com/v1/hToG?date=${d2}-${m2}-${y2}`).then(r=>r.json());

        const date1 = new Date(g1.data.gregorian.date);
        const date2 = new Date(g2.data.gregorian.date);

        showDiff(Math.abs(date2 - date1));
    }
}

function showDiff(diffTime) {
    let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    let years = Math.floor(diffDays / 365);
    let months = Math.floor((diffDays % 365) / 30);
    let days = diffDays - (years * 365) - (months * 30);

    document.getElementById("diff-result").innerHTML = `
        الفرق:<br>
        ${years} سنة — ${months} شهر — ${days} يوم<br>
        (إجمالي الأيام: ${diffDays})
    `;
}

/* ---------------------- تشغيل الصفحة ---------------------- */

window.onload = async () => {
    setupGregorianSelectors();
    await setupHijriSelectors();
    await convertToHijriAndShow();
};
</script>

</div>
</body>
</html>
